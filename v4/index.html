// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

function getBlockColor(score) {
  if (score > 75) return T.success;
  if (score >= 40) return '#FBBF24';
  if (score > 0) return '#FB923C';
  return T.n200;
}

// Helper: calculate semitone diff between two keys
function semitonesDiff(from, to) {
  if (!from || !to) return 0;
  const chrom = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const norm = s => s.replace(/m$/,'').replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#');
  const a = chrom.indexOf(norm(from));
  const b = chrom.indexOf(norm(to));
  if (a < 0 || b < 0) return 0;
  let d = b - a;
  if (d > 6) d -= 12;
  if (d < -6) d += 12;
  return d;
}

function StreakTimeline({ currentDay, onCheckpointTap }) {
  let visibleMax = 7;
  if (currentDay >= 14) visibleMax = 21;
  else if (currentDay >= 7) visibleMax = 14;

  const allDots = [];
  for (let d = 1; d <= visibleMax; d++) {
    const isCheckpoint = STREAK_CHECKPOINTS.includes(d);
    const reached = d <= currentDay;
    allDots.push({ day: d, isCheckpoint, reached });
  }
  return (
    <div style={{ position:'relative', padding:'0 4px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:0, position:'relative' }}>
        {allDots.map((dot, i) => {
          const isCP = dot.isCheckpoint;
          const reached = dot.reached;
          const isToday = dot.day === currentDay;
          const isLarge = isToday;
          const sz = isLarge ? 28 : 5;
          return (
            <React.Fragment key={dot.day}>
              {i > 0 && (
                <div style={{ flex:1, height:2, minWidth:1,
                  background: dot.reached ? 'linear-gradient(90deg,#FF6900,#FF9A3C)' : T.n200,
                  borderRadius:1,
                  transition:'background 500ms ease' }} />
              )}
              <div
                onClick={isCP ? () => onCheckpointTap(dot.day) : undefined}
                style={{
                  width:sz, height:sz, borderRadius:'50%', flexShrink:0, position:'relative',
                  cursor: isCP ? 'pointer' : 'default',
                  background: reached
                    ? (isLarge ? 'linear-gradient(135deg,#FF6900,#FFD93D)' : '#FF9A3C')
                    : (isLarge ? T.n200 : T.n100),
                  display:'flex', alignItems:'center', justifyContent:'center',
                  boxShadow: isLarge
                    ? (reached ? 'inset 0 0 0 2px #FFD93D, 0 0 12px rgba(255,159,61,0.4)' : `inset 0 0 0 2px ${T.n300}`)
                    : 'none',
                  transition:'width 500ms cubic-bezier(0.34,1.56,0.64,1), height 500ms cubic-bezier(0.34,1.56,0.64,1), background 400ms ease, box-shadow 400ms ease, transform 300ms ease',
                  transform: isToday ? 'scale(1.15)' : 'scale(1)',
                }}>
                <span style={{
                  fontSize: isLarge ? 9 : 0, fontWeight:900, fontFamily:'Nunito',
                  color: reached ? '#1a1a2e' : T.n400,
                  opacity: isLarge ? 1 : 0,
                  transition:'font-size 400ms ease, opacity 300ms ease',
                  lineHeight:1,
                }}>
                  {dot.day}
                </span>

function SuperfanCutscene({ sf, onClose }) {
  const lines = CUTSCENE_LINES[sf.id] || [];
  const [lineIdx, setLineIdx] = React.useState(0);
  const [displayText, setDisplayText] = React.useState('');
  const [typing, setTyping] = React.useState(true);
  const currentLine = lines[lineIdx];

  React.useEffect(() => {
    if (!currentLine) return;
    setTyping(true);
    setDisplayText('');
    let i = 0;
    const interval = setInterval(() => {
      i++;
      setDisplayText(currentLine.text.slice(0, i));
      if (i >= currentLine.text.length) { clearInterval(interval); setTyping(false); }
    }, 28);
    return () => clearInterval(interval);
  }, [lineIdx]);

  const advance = () => {
    if (typing) { setDisplayText(currentLine.text); setTyping(false); }
    else if (lineIdx < lines.length - 1) setLineIdx(lineIdx + 1);
    else onClose();
  };

  const isZeke = currentLine?.who === 'zeke';

  return (
    <div onPointerUp={advance}
      style={{ position:'absolute', inset:0, zIndex:200, display:'flex', flexDirection:'column',
        justifyContent:'flex-end', cursor:'pointer', userSelect:'none' }}>
      <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.8)',
        backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)' }} />
      <div style={{ position:'relative', zIndex:1, display:'flex', justifyContent:'center',
        alignItems:'flex-end', gap:24, marginBottom:-8 }}>
        <div style={{ textAlign:'center', transition:'all 0.3s ease',
          opacity: isZeke ? 1 : 0.35, transform: isZeke ? 'scale(1.1)' : 'scale(0.85)' }}>
          <div style={{ fontSize:60, lineHeight:1 }}>🎸</div>
          <div style={{ fontFamily:'Nunito', fontSize:10, fontWeight:800, color:'#FFD93D', marginTop:4 }}>Zeke</div>
        </div>
        <div style={{ textAlign:'center', transition:'all 0.3s ease',
          opacity: !isZeke ? 1 : 0.35, transform: !isZeke ? 'scale(1.1)' : 'scale(0.85)' }}>
          <div style={{ fontSize:60, lineHeight:1 }}>{sf.avatar}</div>
          <div style={{ fontFamily:'Nunito', fontSize:10, fontWeight:800, color:sf.color, marginTop:4 }}>{sf.defaultName}</div>
        </div>
      </div>
      <div style={{ position:'relative', zIndex:1, margin:'20px 16px 44px',
        background:'rgba(255,255,255,0.1)', borderRadius:18, padding:'16px 20px',
        border:'1px solid rgba(255,255,255,0.12)' }}>
        <div style={{ fontFamily:'Nunito', fontSize:10, fontWeight:900, letterSpacing:1.5, marginBottom:6,
          color: isZeke ? '#FFD93D' : sf.color, textTransform:'uppercase' }}>
          {isZeke ? 'Zeke' : sf.defaultName}
        </div>
        <div style={{ fontFamily:'Nunito', fontSize:16, fontWeight:700, color:'white', lineHeight:1.5, minHeight:48 }}>
          {displayText}{typing && <span style={{ opacity:0.5 }}>|</span>}
        </div>
        <div style={{ textAlign:'right', marginTop:6 }}>
          <span style={{ fontFamily:'Nunito', fontSize:10, fontWeight:600, color:'rgba(255,255,255,0.35)' }}>
            {lineIdx < lines.length - 1 ? 'Tap to continue' : 'Tap to close'}
          </span>
        </div>
      </div>
    </div>
  );
}

            <span style={{ fontSize:11, fontWeight:700, color:T.n400 }}>{superfans.length}/{SUPERFAN_DEFS.length} collected</span>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {SUPERFAN_DEFS.map((sf, si) => {
              const earned = superfans.find(s => s.id === sf.id);
              return (
                <div key={sf.id} onClick={() => earned ? setCutsceneSf(sf) : setHudSheet('superfans')}
                  style={{
                    flex:1, borderRadius:14, padding:'10px 4px', textAlign:'center', cursor:'pointer',
                    background: earned ? 'white' : T.n100,
                    boxShadow: earned ? `0 2px 10px ${sf.color}20` : 'none',
                    border: earned ? `1.5px solid ${sf.color}30` : `1.5px solid ${T.n200}`,
                    animation:`popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) ${si*50}ms both`,
                  }}>
                  <div style={{ fontSize:20, filter: earned ? 'none' : 'grayscale(1) opacity(0.25)' }}>
                    {sf.avatar}
                  </div>
                  <div style={{ fontSize:8, fontWeight:800, color: earned ? T.n700 : T.n300, marginTop:4,
                    whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                    {earned ? sf.defaultName.split(' ')[0] : '???'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Bar Reputation (active chapter with task list) ── */}
        {(() => {
          const quests = BADGE_QUESTS_INIT.map((q, qi) => {
            const tasks = q.tasks.map(t => {
              let progress = 0, done = false;
              if (t.type === 'fans') { progress = Math.min(fans, t.target); done = fans >= t.target; }
              else if (t.type === 'superfanCount') { progress = Math.min(superfans.length, t.target); done = superfans.length >= t.target; }
              else if (t.type === 'superfan') { done = superfans.some(sf => sf.id === t.superfanId); progress = done ? 1 : 0; }
              else if (t.type === 'streak') { progress = Math.min(currentStreak, t.target); done = currentStreak >= t.target; }
              else if (t.type === 'coachReviews') { progress = Math.min(coachReviewsEarned, t.target); done = coachReviewsEarned >= t.target; }
              return { ...t, progress, done };
            });
            return { ...q, tasks, done: tasks.every(t => t.done) };
          });
          const active = quests.find((q, i) => !q.done && (i === 0 || quests[i-1].done));
          if (!active) return null;
          const completedTasks = active.tasks.filter(t => t.done).length;
          const pct = Math.round((completedTasks / active.tasks.length) * 100);
          return (
            <div style={{ padding:'22px 16px 0' }}>
              <div style={{ fontSize:14, fontWeight:800, color:T.n900, marginBottom:12 }}>Bar Reputation</div>
              <div style={{ background:'white', borderRadius:20, overflow:'hidden',
                boxShadow:`0 3px 16px ${active.accent}18` }}>
                {/* Header */}
                <div style={{ display:'flex', alignItems:'center', gap:14, padding:'16px 16px 12px' }}>
                  <div style={{ width:56, height:56, borderRadius:14, overflow:'hidden', flexShrink:0,
                    position:'relative', background:active.accent }}>
                    <img src={active.img} alt={active.badgeName} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                    <div style={{ position:'absolute', top:0, left:0, right:0, height:`${100-pct}%`, overflow:'hidden',
                      transition:'height 600ms ease', pointerEvents:'none' }}>
                      <img src={active.img} alt="" style={{ width:56, height:56, objectFit:'cover', filter:'grayscale(1) brightness(0.85)' }}/>
                    </div>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:10, fontWeight:800, color:T.n400, letterSpacing:1, textTransform:'uppercase' }}>
                      Chapter {active.tier}</div>
                    <div style={{ fontSize:16, fontWeight:900, color:T.n950, marginTop:1 }}>{active.badgeName}</div>
                    <div style={{ fontSize:11, fontWeight:600, color:T.n500, marginTop:2 }}>{active.desc}</div>
                  </div>
                </div>
                {/* Task list */}
                <div style={{ padding:'0 16px 14px' }}>
                  {active.tasks.map((task, ti) => {
                    const taskPct = Math.min(100, (task.progress / task.target) * 100);
                    return (
                      <div key={ti} style={{ display:'flex', alignItems:'center', gap:10,
                        padding:'9px 0', borderTop: ti > 0 ? `1px solid ${T.n100}` : 'none' }}>
                        {task.done ? (
                          <svg width="18" height="18" viewBox="0 0 18 18">
                            <circle cx="9" cy="9" r="8" fill={active.accent}/>
                            <path d="M5.5 9.5l2 2L12.5 7" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                          </svg>
                        ) : (
                          <svg width="18" height="18" viewBox="0 0 18 18">
                            <circle cx="9" cy="9" r="7.5" fill="none" stroke={T.n200} strokeWidth="1.5"/>
                          </svg>
                        )}
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13, fontWeight:700, color: task.done ? T.n400 : T.n800,
                            textDecoration: task.done ? 'line-through' : 'none' }}>
                            {task.label}
                          </div>
                          {!task.done && (
                            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4 }}>
                              <div style={{ flex:1, height:3, borderRadius:2, background:T.n100, overflow:'hidden', maxWidth:100 }}>
                                <div style={{ height:'100%', borderRadius:2, width:`${taskPct}%`,
                                  background:`linear-gradient(90deg,${active.accent}99,${active.accent})`,
                                  transition:'width 600ms ease' }}/>
                              </div>
                              <span style={{ fontSize:10, fontWeight:800, color:T.n400 }}>
                                {task.progress}/{task.target}
                              </span>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* Reward */}
                {active.reward && (
                  <div style={{ margin:'0 16px 14px', display:'flex', alignItems:'center', gap:6, padding:'8px 10px',
                    borderRadius:10, background:`${active.accent}08`, border:`1px solid ${active.accent}15` }}>
                    <span style={{ fontSize:11 }}>🎁</span>
                    <span style={{ fontSize:11, fontWeight:700, color:active.accent }}>{active.reward}</span>
                  </div>
                )}
              </div>
            </div>
          );
        })()}

        <div style={{ height:24 }}/>
      </div>

      {/* HUD detail sheets */}
      {hudSheet && (
        <HudDetailSheet type={hudSheet} fans={fans} superfans={superfans}
          sungMinutesThisWeek={sungMinutesThisWeek} coachReviewsEarned={coachReviewsEarned}
          onClose={() => setHudSheet(null)}
          onDebugAddFans={onDebugAddFans} onDebugAddSuperfan={onDebugAddSuperfan}
          onDebugAddMinutes={onDebugAddMinutes} />
      )}

      {/* ── Superfan Cutscene ── */}
      {cutsceneSf && <SuperfanCutscene sf={cutsceneSf} onClose={() => setCutsceneSf(null)} />}
    </div>
  );
}

/* ── Song menu sheet (three-dot) ────────────────────────────── */
function SongMenuSheet({ song, onClose, onRemove, onPersonalize }) {
  const [view, setView] = React.useState('menu'); // 'menu' | 'transpose'
  const [selectedKey, setSelectedKey] = React.useState(song.keyTransposed || song.keyOrig || 'C');

  const semitoneLabel = () => {
    const orig = KEYS.indexOf(song.keyOrig || 'C');
    const cur  = KEYS.indexOf(selectedKey);
    if (orig < 0 || cur < 0) return '';
    const diff = cur - orig;
    if (diff === 0) return 'Original key';
    return diff > 0 ? `+${diff} semitone${diff>1?'s':''}` : `${diff} semitone${diff<-1?'s':''}`;
  };

  return (
    <div style={{ position:'absolute',inset:0,zIndex:50 }}>
      <div style={{ position:'absolute',inset:0,background:'rgba(0,0,0,0.35)',backdropFilter:'blur(2px)' }} onClick={onClose}/>
      <div style={{ position:'absolute',bottom:0,left:0,right:0,background:'white',
        borderRadius:'28px 28px 0 0',padding:'20px 20px 36px',
        animation:'sheetUp 0.32s cubic-bezier(0.34,1.56,0.64,1)' }}>
        <div style={{ width:40,height:4,borderRadius:99,background:T.n300,margin:'0 auto 20px' }}/>

        {/* Song header */}
        <div style={{ display:'flex',alignItems:'center',gap:14,marginBottom:22 }}>
          <AlbumArt song={song} size={52} radius={13}/>
          <div>
            <div style={{ fontFamily:'Nunito',fontSize:16,fontWeight:900,color:T.n950 }}>{song.title}</div>
            <div style={{ fontFamily:'Nunito',fontSize:12,fontWeight:600,color:T.n500,marginTop:2 }}>{song.artist}</div>
          </div>
        </div>

        {view === 'menu' && (
          <>
            {[
              { label:'Personalize (voice key)', icon:'🎼', action:()=>setView('transpose') },
              { label:'Remove from My Songs',    icon:'🗑️', danger:true, action:onRemove },
            ].map(a=>(
              <div key={a.label} onClick={a.action}
                style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 0',
                  borderBottom:`1px solid ${T.n100}`,cursor:'pointer' }}>
                <span style={{ fontSize:20 }}>{a.icon}</span>
                <span style={{ fontFamily:'Nunito',fontSize:15,fontWeight:800,
                  color:a.danger?T.error:T.n900 }}>{a.label}</span>
              </div>
            ))}
          </>
        )}

        {view === 'transpose' && (
          <div>
            <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:16 }}>
              <div onClick={()=>setView('menu')} style={{ cursor:'pointer',color:T.brand600,fontFamily:'Nunito',fontSize:13,fontWeight:800 }}>← Back</div>
              <div style={{ fontFamily:'Nunito',fontSize:15,fontWeight:900,color:T.n950 }}>Voice Transposition</div>
            </div>
            <div style={{ fontFamily:'Nunito',fontSize:12,fontWeight:600,color:T.n500,marginBottom:14,lineHeight:1.5 }}>
              Shift the song into a key that suits your voice range. The original melody stays the same — only the pitch changes.
            </div>
            {/* Semitone readout */}
            <div style={{ textAlign:'center',marginBottom:12 }}>
              <div style={{ fontFamily:'Nunito',fontSize:22,fontWeight:900,color:T.brand600 }}>{selectedKey}</div>
              <div style={{ fontFamily:'Nunito',fontSize:11,fontWeight:700,color:T.n500,marginTop:2 }}>{semitoneLabel()}</div>
            </div>
            {/* Key grid */}
            <div style={{ display:'flex',flexWrap:'wrap',gap:7,marginBottom:18 }}>
              {['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'].map(k=>(
                <div key={k} onClick={()=>setSelectedKey(k)}
                  style={{ width:'calc(25% - 6px)',height:38,borderRadius:11,cursor:'pointer',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    background:selectedKey===k?T.brand600:T.n100,
                    border:`2px solid ${selectedKey===k?T.brand600:'transparent'}`,
                    transition:'all 150ms cubic-bezier(0.34,1.56,0.64,1)' }}>
                  <span style={{ fontFamily:'Nunito',fontSize:13,fontWeight:800,
                    color:selectedKey===k?'white':T.n700 }}>{k}</span>
                </div>
              ))}
            </div>
            <RaisedBtn label="Save key" onPress={()=>onPersonalize({...song, keyTransposed:selectedKey})} small/>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════ */
function AddSongsScreen({ onNav, onBack, projects, setProjects }) {
  const [selected, setSelected] = React.useState(new Set());
  const available = ALL_SONGS.filter(s => !projects.find(p=>p.id===s.id));
  const remaining = (5 - projects.length);

  const toggle = (id) => setSelected(s => {
    const n = new Set(s);
    if (n.has(id)) { n.delete(id); return n; }
    if (n.size >= remaining) return s; // hard cap
    n.add(id); return n;
  });

  const handleAdd = () => {
    const newSongs = ALL_SONGS.filter(s => selected.has(s.id)).map(s=>({...s,progress:0}));
    setProjects(p=>[...p, ...newSongs]);
    onNav('mySongs');

              </div>
              {sel && (
                <div style={{ width:28,height:28,borderRadius:'50%',background:T.brand600,
                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                  boxShadow:`0 4px 12px ${T.brand600}50`,animation:'popIn 0.3s both' }}>
                  <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                    <path d="M1 5L4.5 8.5L12 1" stroke="white" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
              )}
            </div>
          );
        })}
        <div style={{ height:8 }}/>
      </div>

      <div style={{ padding:'8px 16px 24px' }}>
        <RaisedBtn
          label={selected.size>0 ? `Add ${selected.size} song${selected.size>1?'s':''}` : 'Select songs above'}
          disabled={selected.size===0}
          onPress={handleAdd}/>
      </div>
    </div>
  );
}

              {(() => {
                let wordCount = 0;
                const allWords = previewSection.lines.flatMap(l => l.split(/\s+/).filter(Boolean));
                const activeGlobal = Math.min(previewWordIdx, allWords.length - 1);
                const windowStart = Math.max(0, previewSection.lines.findIndex((_,li) => {
                  const before = previewSection.lines.slice(0,li).reduce((s,l) => s + l.split(/\s+/).filter(Boolean).length, 0);
                  const len = previewSection.lines[li].split(/\s+/).filter(Boolean).length;
                  return activeGlobal >= before && activeGlobal < before + len;
                }));
                const visibleLines = previewSection.lines.slice(Math.max(0, windowStart - 1), windowStart + 3);
                const offsetWords = previewSection.lines.slice(0, Math.max(0, windowStart - 1)).reduce((s,l) => s + l.split(/\s+/).filter(Boolean).length, 0);
                let localCount = offsetWords;
                return visibleLines.map((line,li) => {
                  const words = line.split(/\s+/).filter(Boolean);
                  return (
                    <div key={li + windowStart} style={{ marginBottom:2 }}>
                      {words.map((w,wi) => {
                        const idx = localCount++;
                        const isActive = idx === previewWordIdx;
                        const isPast = idx < previewWordIdx;
                        return (
                          <span key={wi} style={{
                            color: isActive ? T.brand500 : isPast ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.25)',
                            fontWeight: isActive ? 900 : 600,
                            transition: 'color 100ms ease',
                          }}>{w}{wi < words.length - 1 ? ' ' : ''}</span>
                        );
                      })}
                    </div>
                  );
                });
              })()}
            </div>
          </div>
        </>
      )}

      {/* Transpose sheet */}

        <SongMenuSheet
          song={song}
          onClose={()=>setShowKey(false)}
          onRemove={()=>setShowKey(false)}
          onPersonalize={(updated)=>{ Object.assign(song, updated); setShowKey(false); }}

      )}

      {/* Boss gate overlay */}
      {showBossGate && <BossGateOverlay song={song} onDismiss={()=>setShowBossGate(false)} onKeepPracticing={()=>setShowBossGate(false)}/>}

    </div>
  );
}

          border:`1.5px solid ${T.brand100}`,

          <div style={{ flex:1,minWidth:0 }}>

// Shared count-up hook: animates from 0 → target over `dur` ms.
// Re-runs whenever `dep` changes. Returns current integer value.
function useCountUp(target, dep, dur = 1100) {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    if (target == null) { setV(0); return; }
    let raf, start;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(Math.round(target * eased));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, dep, dur]);
  return v;
}

function useCountUpFromTo(from, to, trigger, dur = 500) {
  const [v, setV] = React.useState(from);
  React.useEffect(() => {
    if (trigger == null) return;
    let raf, start;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(Math.round(from + (to - from) * eased));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [trigger, dur]);
  return v;
}

function SingMode({ song, section, lastResult, bestResult, onFinish, onClearResult, onGoToGym }) {
  const [phase, setPhase] = React.useState('idle');
  const [count, setCount] = React.useState(3);
  const [currentLine, setCurrentLine] = React.useState(0);
  const [elapsed, setElapsed] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [playingAttempt, setPlayingAttempt] = React.useState(null);
  const [attemptProgress, setAttemptProgress] = React.useState(0);
  const [cardPage, setCardPage] = React.useState(0); // 0 = last, 1 = best
  const cardScrollRef = React.useRef(null);

  const animScore = useCountUp(lastResult ? lastResult.score : null, lastResult?.when, 1100);
  const animBest = useCountUp(bestResult ? bestResult.score : null, bestResult?.when, 1100);
  const [showFans, setShowFans] = React.useState(false);
  const [bonusStep, setBonusStep] = React.useState(-1);
  const [bonusPhase, setBonusPhase] = React.useState('idle');
  const [absorbedTarget, setAbsorbedTarget] = React.useState(0);
  const [absorbedFrom, setAbsorbedFrom] = React.useState(0);
  const [absorbTrigger, setAbsorbTrigger] = React.useState(null);
  const [bumping, setBumping] = React.useState(false);
  React.useEffect(() => {
    if (!lastResult) { setShowFans(false); setBonusStep(-1); setBonusPhase('idle'); setAbsorbedTarget(0); setAbsorbedFrom(0); setAbsorbTrigger(null); return; }
    const t = setTimeout(() => setShowFans(true), 1200);
    return () => clearTimeout(t);
  }, [lastResult?.when]);
  React.useEffect(() => {
    if (!showFans || !lastResult?.bonusFans?.length) return;
    const t = setTimeout(() => setBonusStep(0), 900);
    return () => clearTimeout(t);
  }, [showFans]);
  const collectBonus = React.useCallback(() => {
    if (bonusStep < 0 || !lastResult?.bonusFans || bonusStep >= lastResult.bonusFans.length) return;
    setBonusPhase('shrink');
    setTimeout(() => {
      setBonusPhase('flyup');
      setTimeout(() => {
        const bonusFans = lastResult.bonusFans[bonusStep].fans;
        setAbsorbedFrom(absorbedTarget);
        setAbsorbedTarget(prev => prev + bonusFans);
        setAbsorbTrigger(Date.now());
        setBumping(true);
        setTimeout(() => setBumping(false), 400);
        setBonusPhase('idle');
        setBonusStep(s => s + 1);
      }, 350);
    }, 300);
  }, [bonusStep, lastResult, absorbedTarget]);
  const animFans = useCountUp(showFans && lastResult ? lastResult.fans : null, showFans ? 'go' : null, 800);
  const animAbsorbed = useCountUpFromTo(absorbedFrom, absorbedTarget, absorbTrigger, 500);
  const displayFans = animFans + (absorbTrigger ? animAbsorbed : 0);

  const lines = section.lines;
  const beatMs = 60000 / song.bpm;
  const lineDurMs = beatMs * 4;

  // Countdown (overlay) during rec
  React.useEffect(() => {
    if (phase !== 'rec' || count <= 0) return;
    const t = setTimeout(() => setCount(c => c - 1), beatMs);
    return () => clearTimeout(t);
  }, [phase, count, beatMs]);

  // Line advance + finish auto-advance
  React.useEffect(() => {
    if (phase !== 'rec' || count > 0 || paused) return;
    const t = setTimeout(() => {
      setCurrentLine(i => {
        if (i >= lines.length - 1) {
          // Auto-advance to Recorded
          setPhase('done');
          return i;
        }
        return i + 1;
      });
    }, lineDurMs);
    return () => clearTimeout(t);
  }, [phase, count, currentLine, paused, lineDurMs, lines.length]);

  // Elapsed ticker
  React.useEffect(() => {
    if (phase !== 'rec' || count > 0 || paused) return;
    const t = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(t);
  }, [phase, count, paused]);

  // Recorded → auto-advance after 1s to show inline results
  React.useEffect(() => {
    if (phase !== 'done') return;
    const t = setTimeout(() => {
      onFinish({
        score: 68,
        when: 'Just now',
        fans: FAN_REWARDS.section,
        bonusFans: [{ label:'New personal best!', fans:5 }],
        coachNote: 'Timing drifted in the middle — try locking into the rhythm before you sing each line.',
      });
      // reset so next recording works
      setPhase('idle'); setCount(3); setCurrentLine(0); setElapsed(0); setPaused(false);
    }, 1000);
    return () => clearTimeout(t);
  }, [phase, onFinish]);

  // Attempt playback (fake) — advance progress bar over 3s
  React.useEffect(() => {
    if (!playingAttempt) return;
    const t = setInterval(() => {
      setAttemptProgress(p => {
        if (p >= 100) { setPlayingAttempt(null); return 0; }
        return p + 3;
      });
    }, 90);
    return () => clearInterval(t);
  }, [playingAttempt]);

  const singLyricsRef = React.useRef(null);
  React.useEffect(() => {
    if (phase !== 'rec' || !singLyricsRef.current) return;
    const el = singLyricsRef.current.children[currentLine];
    if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
  }, [currentLine, phase]);

  const start = () => {
    onClearResult?.();
    setCount(0); setCurrentLine(0); setElapsed(0); setPaused(false);
    setPhase('rec');
  };

  const restart = () => {
    setCount(0); setCurrentLine(0); setElapsed(0); setPaused(false);
  };

  const togglePause = () => setPaused(p => !p);

  return (
    <div style={{ height:'100%',display:'flex',flexDirection:'column',padding:'16px 20px 20px',animation:'fadeUp 0.3s both',position:'relative' }}>
      {phase === 'idle' && (
        <div style={{ flex:1,display:'flex',flexDirection:'column',minHeight:0,overflow:'auto' }}>
          {lastResult ? (() => {
            const sc = lastResult.score;
            const scColor = sc >= 70 ? T.success : sc >= 50 ? T.warning : T.error;
            return (
              <React.Fragment>
                {/* ── Score + Fans card ── */}
                <div style={{ background:'white', borderRadius:18, padding:'20px',
                  boxShadow:'0 4px 18px rgba(255,105,0,0.12)', border:`2px solid ${T.brand200}`,
                  animation:'popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both', flexShrink:0 }}>
                  {/* Two big numbers side by side */}
                  <div style={{ display:'flex', gap:0 }}>
                    {/* Accuracy */}
                    <div style={{ flex:1, textAlign:'center',
                      borderRight:`1.5px solid ${T.n100}` }}>
                      <div style={{ fontFamily:'Nunito', fontSize:10, fontWeight:900, color:T.n400,
                        letterSpacing:1, textTransform:'uppercase', marginBottom:6 }}>Accuracy</div>
                      <div style={{ display:'flex', alignItems:'baseline', justifyContent:'center', gap:2 }}>
                        <span style={{ fontFamily:'Nunito', fontSize:44, fontWeight:900, lineHeight:1,
                          color:scColor }}>{animScore}</span>
                        <span style={{ fontFamily:'Nunito', fontSize:15, fontWeight:800, color:T.n400 }}>%</span>
                      </div>
                    </div>
                    {/* Fans earned */}
                    <div style={{ flex:1, textAlign:'center', position:'relative',
                      opacity: showFans ? 1 : 0.15,
                      transition:'opacity 400ms ease' }}>
                      <div style={{ fontFamily:'Nunito', fontSize:10, fontWeight:900, color:T.n400,
                        letterSpacing:1, textTransform:'uppercase', marginBottom:6 }}>Fans Earned</div>
                      <div style={{ display:'flex', alignItems:'baseline', justifyContent:'center', gap:4,
                        animation: bumping ? 'fansBump 0.35s ease' : 'none' }}>
                        <span style={{ fontSize:16, opacity:0.8 }}>👥</span>
                        <span style={{ fontFamily:'Nunito', fontSize:44, fontWeight:900, lineHeight:1,
                          color:'#E65100' }}>+{displayFans}</span>
                      </div>
                    </div>
                  </div>

                  {/* Bonus fans — appear one at a time then fly up into the total */}
                  {showFans && lastResult.bonusFans && lastResult.bonusFans.length > 0 && (
                    <div style={{ marginTop:14, minHeight:40, position:'relative', display:'flex',
                      flexDirection:'column', alignItems:'center' }}>
                      {lastResult.bonusFans.map((b, bi) => {
                        if (bi !== bonusStep) return null;
                        const isFlyingUp = bonusPhase === 'flyup';
                        const isShrinking = bonusPhase === 'shrink';
                        return (
                          <div key={bi} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                            padding: isShrinking || isFlyingUp ? '5px 10px' : '8px 14px',
                            borderRadius:12, background:'#FFF8E1',
                            border:'1px solid #FFE082',
                            transform: isShrinking ? 'scale(0.65)' : isFlyingUp ? 'scale(0.3) translateY(-55px)' : 'scale(1)',
                            opacity: isFlyingUp ? 0 : 1,
                            transition: isFlyingUp
                              ? 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease'
                              : isShrinking

/* ── GYM — phrase-by-phrase tight loop ──────────────────────── */
// Group section.lines into phrases of 2-3 lines each.
function buildPhrases(lines) {
  const out = [];
  let i = 0;
  while (i < lines.length) {
    // Prefer pairs; use 3 when only 3 remain to avoid a lonely last line.
    const take = (lines.length - i === 3) ? 3 : Math.min(2, lines.length - i);
    out.push(lines.slice(i, i + take));
    i += take;
  }
  return out;
}

// Deterministic hash → [0,1) for stable per-phrase word coloring
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (h >>> 0) / 0xffffffff;
}
// Word pitch categories → colors
//   good = green (on pitch), high = red (too high),
//   low  = blue  (too low),  miss = grey (missed)

  good: '#16A34A',
  high: '#B91C1C',

};

      {Array.from({length:32}).map((_,i)=>{
        const bg = recActive
          ? `linear-gradient(180deg,${T.error},${T.brand600})`
          : `linear-gradient(180deg,${song.grad[0]},${song.grad[1]})`;
        const h = listenActive ? 8 + (Math.sin(i*0.7+playLine*2+singTick*0.1)+1)*15
                 : recActive  ? 6 + Math.abs(Math.sin(i*0.55+singTick*0.3))*26
                 : 6;
        return (
          <div key={i} style={{ width:3,borderRadius:99,
            background: active ? bg : T.n300,
            height: `${h}px`,
            opacity: active ? 0.85 : 0.4,
            transition:'height 240ms ease' }}/>
        );
      })}
    </div>
  );
}

/* ── GYM ENGINE — shared state + side effects for all variants ─ */
function useGymEngine({ song, section, autoAdvance = true, singResult }) {
  const phrases = React.useMemo(
    () => section.phrases && section.phrases.length
      ? section.phrases
      : buildPhrases(section.lines),
    [section]
  );
  const [idx, setIdx] = React.useState(0);
  const [step, setStep] = React.useState('listenPlay');
  const [listenPlaying, setListenPlaying] = React.useState(false);
  const [playLine, setPlayLine] = React.useState(0);
  const [count, setCount] = React.useState(3);
  const [singTick, setSingTick] = React.useState(0);
  const [singProgress, setSingProgress] = React.useState(0);
  // States: 'needsWork' | 'close' | 'solid' (no untried — pre-populated from Sing)
  const [phraseStatus, setPhraseStatus] = React.useState(() => {
    const m = {};
    phrases.forEach((_, i) => {
      const h = hashStr(`${section.id || section.label}-prior-${i}`);
      m[i] = h > 0.7 ? 'solid' : h > 0.4 ? 'close' : 'needsWork';
    });
    return m;
  });
  const [scoreHistory, setScoreHistory] = React.useState(() => {
    const m = {};
    phrases.forEach((_, i) => {
      const st = phraseStatus[i];
      const h = hashStr(`${section.id || section.label}-priorScore-${i}`);
      m[i] = [Math.round(st === 'solid' ? 70 + h * 20 : st === 'close' ? 40 + h * 28 : 15 + h * 24)];
    });
    return m;
  });

  const beatMs = 60000 / song.bpm;
  const lineMs = beatMs * 4;
  const phrase = phrases[idx] || [];

  const wordPlan = React.useMemo(()=>{
    const cats = ['good','good','good','good','high','low','miss'];
    const tokens = [];
    const attempts = (scoreHistory[idx] || []).length;
    phrase.forEach((line, li) => {
      const parts = line.split(/(\s+)/);
      parts.forEach((p, pi) => {
        if (p === '') return;
        if (/^\s+$/.test(p)) { tokens.push({ line:li, text:p, space:true }); return; }
        const h = hashStr(`${idx}-${attempts}-${li}-${pi}-${p}`);
        const cat = cats[Math.floor(h * cats.length)];
        tokens.push({ line:li, text:p, space:false, cat });
      });
    });
    return tokens;
  }, [phrase, idx, scoreHistory]);
  const nonSpaceCount = wordPlan.filter(t => !t.space).length;

  const selectPhrase = (i) => {
    setIdx(i); setPlayLine(0); setListenPlaying(true);
    setCount(3); setSingTick(0); setSingProgress(0); setStep('listenPlay');
  };
  const selectPhraseQuiet = (i) => {
    setIdx(i); setPlayLine(0); setListenPlaying(false);
    setCount(3); setSingTick(0); setSingProgress(0); setStep('listenPlay');
  };
  const retry = () => {
    // 1-beat countdown — user just heard themselves; no need for 3.
    setCount(1); setSingTick(0); setSingProgress(0); setStep('countdown');
  };
  const listenAgain = () => {
    setPlayLine(0); setListenPlaying(true); setStep('listenPlay');
  };
  const skipCountdown = () => {
    setCount(0); setSingTick(0); setSingProgress(0); setStep('sing');
  };
  const startSinging = () => {
    setCount(3); setSingTick(0); setSingProgress(0); setStep('countdown');
  };

  // Listen tick
  React.useEffect(()=>{
    if (step !== 'listenPlay' || !listenPlaying) return;
    if (playLine >= phrase.length) { setCount(3); setStep('countdown'); return; }
    const t = setTimeout(()=> setPlayLine(l=>l+1), lineMs);
    return ()=> clearTimeout(t);
  }, [step, playLine, phrase.length, lineMs, listenPlaying]);

  // Countdown tick
  React.useEffect(()=>{
    if (step !== 'countdown') return;
    if (count <= 0) { setSingTick(0); setSingProgress(0); setStep('sing'); return; }
    const t = setTimeout(()=> setCount(c=>c-1), beatMs);
    return ()=> clearTimeout(t);
  }, [step, count, beatMs]);

  // Sing tick — record progress, score it, push to history.
  React.useEffect(()=>{
    if (step !== 'sing') return;
    const duration = lineMs * phrase.length;
    const startT = Date.now();
    const tick = setInterval(()=>{
      setSingTick(t=>t+1);
      const dt = Date.now() - startT;
      setSingProgress(Math.min(1, dt / duration));
      if (dt >= duration) {
        clearInterval(tick);
        const good = wordPlan.filter(t=>!t.space && t.cat==='good').length;
        const ratio = nonSpaceCount > 0 ? good / nonSpaceCount : 0;
        const score = Math.round(ratio * 100);
        const status = score >= 70 ? 'solid' : score >= 40 ? 'close' : 'needsWork';
        setPhraseStatus(s => ({ ...s, [idx]: status }));
        setScoreHistory(h => ({ ...h, [idx]: [...(h[idx]||[]), score] }));
        setStep('feedback');
      }
    }, 70);
    return ()=> clearInterval(tick);
  }, [step, lineMs, phrase.length, wordPlan, nonSpaceCount, idx]);

  // Auto-advance to next phrase ~900ms after a 'solid' result.
  React.useEffect(() => {
    if (!autoAdvance) return;
    if (step !== 'feedback') return;
    if (phraseStatus[idx] !== 'solid') return;
    if (idx >= phrases.length - 1) return;
    const t = setTimeout(() => selectPhrase(idx + 1), 900);
    return () => clearTimeout(t);
  }, [step, phraseStatus, idx, phrases.length, autoAdvance]);

  const revealedCount = Math.floor(singProgress * nonSpaceCount);
  const solidCount = phrases.reduce((n, _, i) => phraseStatus[i] === 'solid' ? n+1 : n, 0);
  const verseMastery = Math.round((solidCount / phrases.length) * 100);
  const verseLocked = solidCount === phrases.length;
  const lastScores = scoreHistory[idx] || [];
  const lastScore = lastScores[lastScores.length-1] ?? null;
  const prevScore = lastScores[lastScores.length-2] ?? null;
  const lastDelta = (lastScore != null && prevScore != null) ? lastScore - prevScore : null;

  return {
    phrases, idx, step, listenPlaying, playLine, count, singTick, singProgress,
    phraseStatus, scoreHistory, beatMs, lineMs, phrase, wordPlan, nonSpaceCount,
    revealedCount, solidCount, verseMastery, verseLocked, lastScore, lastDelta,
    selectPhrase, selectPhraseQuiet, retry, listenAgain, skipCountdown, startSinging, setListenPlaying,
  };
}

/* ── Helpers shared by Gym variants ─────────────────────────── */
function colorizeLine(line, li, eng, opts={}) {
  const { wordPlan, revealedCount, step } = eng;
  const { fontSize=17, color=T.n800 } = opts;
  if (step !== 'sing' && step !== 'feedback') {
    return <div style={{ fontFamily:'Nunito',fontSize,fontWeight:800,color,lineHeight:1.45 }}>{line}</div>;
  }
  let runningNonSpace = 0;
  return (
    <div style={{ fontFamily:'Nunito',fontSize,fontWeight:900,lineHeight:1.45 }}>
      {wordPlan.map((tok, gi) => {
        if (tok.line !== li) {
          if (!tok.space) runningNonSpace++;
          return null;
        }
        if (tok.space) return <span key={gi}>{tok.text}</span>;
        const nsi = runningNonSpace++;
        let c;
        if (step === 'sing') {
          if (nsi < revealedCount) c = WORD_COLORS[tok.cat];
          else if (nsi === revealedCount) c = T.n950;
          else c = T.n300;
        } else {
          c = WORD_COLORS[tok.cat];
        }
        const underline = step === 'feedback' && tok.cat !== 'good' ? 'underline' : 'none';
        return (
          <span key={gi} style={{ color:c, textDecoration:underline,
            textDecorationThickness:'2px', textUnderlineOffset:'4px',
            transition:'color 180ms ease' }}>{tok.text}</span>
        );
      })}
    </div>
  );
}

function DeltaBadge({ delta, lastScore }) {
  if (delta == null) {
    if (lastScore == null) return null;
    return (
      <div style={{ display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',
        borderRadius:99,background:T.n100,fontFamily:'Nunito',fontSize:10,fontWeight:900,color:T.n600 }}>
        Score · {lastScore}%
      </div>
    );
  }
  const up = delta > 0;
  const c = up ? T.success : delta < 0 ? T.error : T.n500;
  const bg = up ? '#DCFCE7' : delta < 0 ? '#FEE2E2' : T.n100;
  return (
    <div style={{ display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',
      borderRadius:99,background:bg,fontFamily:'Nunito',fontSize:10,fontWeight:900,color:c }}>
      {up ? '▲' : delta < 0 ? '▼' : '·'} {up ? '+' : ''}{delta} pts vs last
    </div>
  );
}

          {listenPlaying ? (
            <svg width="18" height="20" viewBox="0 0 18 20"><rect x="2" y="2" width="4.5" height="16" rx="1.4" fill="white"/><rect x="11.5" y="2" width="4.5" height="16" rx="1.4" fill="white"/></svg>
          ) : (
            <svg width="18" height="20" viewBox="0 0 18 20"><path d="M3 1L17 10L3 19Z" fill="white"/></svg>
          )}

        <div style={{ fontFamily:'Nunito',fontSize:10,fontWeight:800,color:T.n500 }}>

    return (
      <div onPointerUp={skipCountdown}
        style={{ display:'flex',flexDirection:'column',alignItems:'center',gap:5,cursor:'pointer',userSelect:'none' }}>
        <div key={count} style={{ fontFamily:'Nunito',fontSize:compact?44:60,fontWeight:900,
          lineHeight:1,color:T.brand600,animation:'popIn 0.36s cubic-bezier(0.34,1.56,0.64,1)' }}>
          {count}
        </div>
        <div style={{ fontFamily:'Nunito',fontSize:10,fontWeight:800,color:T.n400,letterSpacing:0.6,textTransform:'uppercase' }}>
          Tap to start now

      <div style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:8 }}>
        <div style={{ width:11,height:11,borderRadius:'50%',background:T.error,
          animation:'pulseGlow 1s ease-in-out infinite' }}/>
        <span style={{ fontFamily:'Nunito',fontSize:12,fontWeight:900,color:T.error,letterSpacing:1.2 }}>REC</span>
        <span style={{ fontFamily:'Nunito',fontSize:11,fontWeight:700,color:T.n500 }}>
          Words colour as you sing
        </span>
      </div>
    );
  }
  // feedback
  return (
    <div style={{ display:'flex',gap:8 }}>
      <div onPointerUp={listenAgain}
        style={{ flex:1,height:42,borderRadius:12,cursor:'pointer',
          background:'white',border:`1.5px solid ${T.n200}`,
          display:'flex',alignItems:'center',justifyContent:'center',gap:6 }}>
        <span style={{ fontSize:13 }}>🎧</span>
        <span style={{ fontFamily:'Nunito',fontSize:12,fontWeight:900,color:T.n700 }}>Listen</span>
      </div>
      <div onPointerUp={retry}
        style={{ flex:2,height:42,borderRadius:12,cursor:'pointer',
          background:`linear-gradient(180deg,#FF7A10,${T.brand600})`,
          display:'flex',alignItems:'center',justifyContent:'center',gap:6,
          boxShadow:`0 4px 14px ${T.brand600}40`,
          animation:'pulseGlow 2.4s ease-in-out infinite' }}>
        <span style={{ fontSize:14 }}>↻</span>
        <span style={{ fontFamily:'Nunito',fontSize:13,fontWeight:900,color:'white' }}>Retry</span>
      </div>
    </div>
  );
}

function CountUpNumber({ value, duration = 800, onComplete, dark = false }) {
  const [display, setDisplay] = React.useState(0);
  const calledRef = React.useRef(false);
  React.useEffect(() => {
    calledRef.current = false;
    let start = null;
    const target = value;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(Math.round(eased * target));
      if (p < 1) requestAnimationFrame(step);
      else if (onComplete && !calledRef.current) { calledRef.current = true; onComplete(); }
    };
    requestAnimationFrame(step);
  }, [value, duration]);
  return (
    <span style={{ fontFamily:'Nunito',fontSize:56,fontWeight:900,lineHeight:1,
      color: dark ? T.n950 : 'white',
      textShadow: dark ? 'none' : '0 2px 20px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.15)' }}>
      {display}%
    </span>
  );
}

function DeltaExplode({ delta }) {

    </div>
  );
}
