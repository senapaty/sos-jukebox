function GymOrbitLayout({ song, section, eng }) {
  const { phrases, idx, step, phrase, phraseStatus, verseMastery, verseLocked,
    selectPhrase, selectPhraseQuiet, lastScore, lastDelta, scoreHistory, retry, listenAgain,
    listenPlaying, setListenPlaying, count, skipCountdown, singProgress, solidCount } = eng;
  const N = phrases.length;

  const pickerRef = React.useRef(null);
  const [showFeedback, setShowFeedback] = React.useState(false);
  const prevStep = React.useRef(step);

  React.useEffect(() => {
    if (prevStep.current !== 'feedback' && step === 'feedback') setShowFeedback(true);
    prevStep.current = step;
  }, [step]);

  React.useEffect(() => {
    if (!pickerRef.current) return;
    const el = pickerRef.current;
    const item = el.querySelector(`[data-phrase-idx="${idx}"]`);
    if (!item) return;
    const target = item.offsetTop - (el.clientHeight / 2 - item.offsetHeight / 2);
    el.scrollTo({ top: target, behavior: 'smooth' });
  }, [idx]);

  const snapRef = React.useRef(null);
  const handlePickerScroll = () => {
    clearTimeout(snapRef.current);
    snapRef.current = setTimeout(() => {
      if (!pickerRef.current) return;
      const el = pickerRef.current;
      const items = el.querySelectorAll('[data-phrase-idx]');
      if (!items.length) return;
      const center = el.scrollTop + el.clientHeight / 2;
      let closest = 0, closestDist = Infinity;
      items.forEach(item => {
        const mid = item.offsetTop + item.offsetHeight / 2;
        const d = Math.abs(mid - center);
        if (d < closestDist) { closestDist = d; closest = parseInt(item.dataset.phraseIdx, 10); }
      });
      if (closest !== idx && step !== 'sing' && step !== 'countdown') selectPhraseQuiet(closest);
    }, 120);
  };

  const getScoreColor = (score) => {
    if (score >= 70) return T.success;
    if (score >= 40) return T.warning;
    return T.error;
  };

  const FEEDBACK_MESSAGES = [
    { min: 80, emoji: '🔥', title: 'Nailed it!', body: 'Your pitch and timing were spot on. This phrase is locked in.' },
    { min: 60, emoji: '💪', title: 'Almost there', body: 'Pitch was mostly on target. Watch the marked words — try holding those notes a beat longer.' },
    { min: 40, emoji: '🎯', title: 'Getting closer', body: 'Good rhythm feel. Focus on the underlined words — those pitches drifted. Try listening once more before your next take.' },
    { min: 0,  emoji: '🌱', title: 'Building it up', body: 'No rush — this phrase has some tricky intervals. Hit Listen to lock the melody in your ear, then sing it back.' },
  ];

  const getFeedback = (score) => FEEDBACK_MESSAGES.find(f => score >= f.min) || FEEDBACK_MESSAGES[3];

  const [showLyricBreakdown, setShowLyricBreakdown] = React.useState(false);
  const dismissFeedback = () => { setShowFeedback(false); };
  const handleRetry = () => { setShowFeedback(false); retry(); };
  const handleGoDeep = () => { setShowFeedback(false); setShowLyricBreakdown(true); };

  const buttonsVisible = !showFeedback && !showLyricBreakdown && step !== 'sing' && step !== 'countdown';

  return (
    <div style={{ height:'100%',display:'flex',flexDirection:'column',background:T.n50,
      position:'relative',animation:'fadeUp 0.3s both',overflow:'hidden' }}>

      {/* ── Phrase path pills ── */}
      <div style={{ flexShrink:0,padding:'8px 12px 4px' }}>
        <div style={{ display:'flex',alignItems:'stretch',gap:0,overflowX:'auto',paddingBottom:2 }}>
          {phrases.map((_, i) => {
            const st = phraseStatus[i];
            const stNext = phraseStatus[i+1];
            const active = i === idx;
            const PILL = {
              needsWork: { bg:'#FEE2E2',  fg:'#DC2626', border:'#DC262640', label:'Needs work' },
              close:     { bg:'#FEF9C3',  fg:'#B45309', border:'#B4530940', label:'Almost there' },
              solid:     { bg:'#DCFCE7',  fg:T.success, border:T.success+'40', label:'Solid' },
            };
            const p = PILL[st] || PILL.needsWork;
            const segDone = (s) => s === 'solid' || s === 'close';
            const segmentLit = segDone(st) && segDone(stNext);
            return (
              <React.Fragment key={i}>
                <div onPointerUp={() => { if (step !== 'sing' && step !== 'countdown') selectPhraseQuiet(i); }}
                  style={{ flex:'1 0 auto',minWidth:72,cursor:'pointer',userSelect:'none',
                    padding:'7px 9px',borderRadius:12,
                    background: active ? T.brand50 : p.bg,
                    border: active ? `2px solid ${T.brand500}` : `1.5px solid ${p.border}`,
                    boxShadow: active ? `0 2px 8px ${T.brand500}25` : 'none',
                    transition:'all 200ms ease',zIndex:1 }}>
                  <div style={{ fontFamily:'Nunito',fontSize:10,fontWeight:900,
                    color: active ? T.brand700 : T.n500,letterSpacing:0.3 }}>
                    Phrase {i+1}
                  </div>
                  <div style={{ display:'flex',alignItems:'center',gap:5,marginTop:3 }}>
                    <div style={{ width:7,height:7,borderRadius:'50%',
                      background: active ? T.brand500 : p.fg,flexShrink:0 }}/>
                    <span style={{ fontFamily:'Nunito',fontSize:11,fontWeight:900,
                      color: active ? T.brand600 : p.fg }}>
                      {p.label}
                    </span>
                  </div>
                </div>
                {i < N - 1 && (
                  <div style={{ width:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
                    <div style={{ height:3,width:'100%',borderRadius:99,
                      background: segmentLit ? T.success : T.n200,
                      boxShadow: segmentLit ? `0 0 8px ${T.success}88` : 'none',
                      transition:'all 260ms ease' }}/>
                  </div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* ── Phrase picker ── */}
      <div ref={pickerRef} onScroll={handlePickerScroll}
        style={{ flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',
          position:'relative',willChange:'scroll-position',
          pointerEvents: step === 'sing' || step === 'countdown' ? 'none' : 'auto' }}>
        <div style={{ height:'28%',pointerEvents:'none' }} />
        {phrases.map((ph, i) => {
          const active = i === idx;
          const dist = Math.abs(i - idx);
          return (
            <div key={i} data-phrase-idx={i}
              onPointerUp={() => { if (step !== 'sing' && step !== 'countdown' && !active) selectPhraseQuiet(i); }}
              style={{ padding:'10px 24px',cursor: active ? 'default' : 'pointer',
                opacity: active ? 1 : (step === 'sing' || step === 'countdown') ? 0.15 : Math.max(0.25, 1 - dist * 0.35),
                filter: !active && (step === 'sing' || step === 'countdown') ? 'blur(3px)' : 'none',
                transition:'opacity 300ms ease, filter 300ms ease' }}>
              <div style={{ background: active ? 'white' : 'transparent',
                borderRadius:20,padding: active ? '18px 20px' : '12px 20px',
                boxShadow: active ? '0 4px 20px rgba(0,0,0,0.08)' : 'none',
                border: active && step === 'sing' ? `2px solid ${T.error}`
                      : active && step === 'listenPlay' ? `2px solid ${T.brand400}`
                      : active ? `2px solid ${T.n100}` : '2px solid transparent',
                transition:'background 200ms, box-shadow 200ms, border-color 200ms' }}>
                <div style={{ fontFamily:'Nunito',fontSize:10,fontWeight:900,
                  color: active ? T.brand600 : T.n400,
                  letterSpacing:1,textTransform:'uppercase',marginBottom:6 }}>
                  Phrase {i + 1}
                </div>
                {ph.map((line, li) => (
                  <div key={li} style={{ marginBottom:4 }}>
                    {active ? colorizeLine(line, li, eng, { fontSize:20 }) : (
                      <div style={{ fontFamily:'Nunito',fontSize: dist <= 1 ? 18 : 16,fontWeight:800,
                        color:T.n500,lineHeight:1.45 }}>{line}</div>
                    )}
                  </div>
                ))}
                {active && step === 'sing' && (
                  <div style={{ marginTop:10,display:'flex',alignItems:'center',gap:8 }}>
                    <div style={{ width:11,height:11,borderRadius:'50%',background:T.error,
                      animation:'pulseGlow 1s ease-in-out infinite' }}/>
                    <span style={{ fontFamily:'Nunito',fontSize:12,fontWeight:900,color:T.error,letterSpacing:1.2 }}>REC</span>
                    <span style={{ fontFamily:'Nunito',fontSize:11,fontWeight:700,color:T.n500 }}>
                      Sing along with the lyrics
                    </span>
                  </div>
                )}
                {active && step === 'countdown' && (
                  <div onPointerUp={skipCountdown}
                    style={{ marginTop:8,display:'flex',alignItems:'center',justifyContent:'center',
                      gap:8,cursor:'pointer',userSelect:'none' }}>
                    <span key={count} style={{ fontFamily:'Nunito',fontSize:36,fontWeight:900,
                      color:T.brand600,lineHeight:1,
                      animation:'popIn 0.36s cubic-bezier(0.34,1.56,0.64,1)' }}>{count}</span>
                    <span style={{ fontFamily:'Nunito',fontSize:11,fontWeight:800,color:T.n400 }}>tap to skip</span>
                  </div>
                )}
                {active && step === 'listenPlay' && (
                  <div style={{ marginTop:8,display:'flex',alignItems:'center',gap:8 }}>
                    <div style={{ display:'flex',gap:3,alignItems:'center',height:20 }}>
                      {Array.from({length:5}).map((_,bi) => (
                        <div key={bi} style={{ width:3,borderRadius:2,
                          background:T.brand500,
                          animation: listenPlaying ? `waveBar 0.6s ${bi*0.08}s ease-in-out infinite` : 'none',
                          height: listenPlaying ? undefined : 3 }}/>
                      ))}
                    </div>
                    <span style={{ fontFamily:'Nunito',fontSize:11,fontWeight:800,
                      color:T.n500 }}>
                      {listenPlaying ? 'Listening...' : 'Paused'}
                    </span>
                  </div>
                )}
              </div>
            </div>
          );
        })}
        <div style={{ height:'28%',pointerEvents:'none' }} />
      </div>

      {/* ── Feedback overlay ── */}
      {showFeedback && (() => {
        const score = lastScore ?? 0;
        const fb = getFeedback(score);
        const showDelta = lastDelta != null && lastDelta > 0;
        return (
          <FeedbackOverlay score={score} fb={fb} showDelta={showDelta} delta={lastDelta}
            onDismiss={dismissFeedback} onGoDeep={handleGoDeep} onRetry={handleRetry}/>
        );
      })()}

      {/* ── Lyric breakdown overlay (Go Deep) ── */}
      {showLyricBreakdown && (() => {
        const wp = eng.wordPlan || [];
        const words = wp.filter(t => !t.space);
        const goodN = words.filter(t => t.cat === 'good').length;
        const highN = words.filter(t => t.cat === 'high').length;
        const lowN  = words.filter(t => t.cat === 'low').length;
        const missN = words.filter(t => t.cat === 'miss').length;
        const total = words.length || 1;
        const pctGood = Math.round(goodN / total * 100);
        let elephantTip = '';
        if (pctGood >= 80) elephantTip = 'Almost flawless! A couple of words drifted slightly — focus on keeping steady breath through the end.';
        else if (highN > lowN && highN > missN) elephantTip = 'You\'re going sharp on several words. Try relaxing your throat and aiming just a touch lower — think of singing "into" the note rather than "over" it.';
        else if (lowN > highN && lowN > missN) elephantTip = 'Some notes are falling flat. Engage your core a bit more and imagine the note sitting right behind your eyes — it\'ll help lift the pitch.';
        else if (missN >= highN && missN >= lowN) elephantTip = 'A few words got away from you. Try humming the melody first before singing the lyrics — it helps your voice find the right placement.';
        else elephantTip = 'Mixed results here — some high, some low. Slow it down mentally and focus on each word landing cleanly. You\'re close!';
        return (
        <div style={{ position:'absolute',inset:0,zIndex:20,
          background:'rgba(250,250,250,0.97)',
          display:'flex',flexDirection:'column',
          padding:'16px 20px 20px',animation:'fadeUp 0.25s both',overflow:'hidden' }}>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14 }}>
            <div style={{ fontFamily:'Nunito',fontSize:18,fontWeight:900,color:T.n950 }}>
              Phrase {idx + 1} Breakdown
            </div>
            <div onPointerUp={()=>setShowLyricBreakdown(false)}
              style={{ width:36,height:36,borderRadius:'50%',background:T.n100,
                display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer' }}>
              <svg width="14" height="14" viewBox="0 0 14 14">
                <path d="M1 1l12 12M13 1L1 13" stroke={T.n500} strokeWidth="2" strokeLinecap="round"/>
              </svg>
            </div>
          </div>

          {/* AI Elephant guidance */}
          <div style={{ display:'flex',gap:12,marginBottom:16,
            background:'#FFF7F0',borderRadius:16,padding:'14px 16px',
            border:`1.5px solid ${T.brand200}` }}>
            <Mascot size={48}/>
            <div style={{ flex:1,minWidth:0 }}>
              <div style={{ fontFamily:'Nunito',fontSize:10,fontWeight:900,color:T.brand600,
                letterSpacing:1,textTransform:'uppercase',marginBottom:3 }}>AI-lephant says</div>
              <div style={{ fontFamily:'Nunito',fontSize:13,fontWeight:600,color:T.n700,lineHeight:1.45 }}>
                {elephantTip}
              </div>
            </div>
          </div>

          {/* Legend */}
          <div style={{ display:'flex',gap:12,marginBottom:14,flexWrap:'wrap' }}>
            {[
              { color:WORD_COLORS.good, label:'On pitch' },
              { color:WORD_COLORS.high, label:'Too high' },
              { color:WORD_COLORS.low,  label:'Too low' },
              { color:WORD_COLORS.miss, label:'Missed' },
            ].map(l => (
              <div key={l.label} style={{ display:'flex',alignItems:'center',gap:5 }}>
                <div style={{ width:10,height:10,borderRadius:3,background:l.color }}/>
                <span style={{ fontFamily:'Nunito',fontSize:11,fontWeight:800,color:T.n600 }}>{l.label}</span>
              </div>
            ))}
          </div>

          {/* Color-coded lyrics — large font */}
          <div style={{ flex:1,overflowY:'auto' }}>
            <div style={{ fontFamily:'Nunito',fontSize:22,fontWeight:800,lineHeight:1.8 }}>
              {(() => {
                if (!wp.length) return phrase.map((l,i) => (
                  <div key={i} style={{ color:T.n600 }}>{l}</div>
                ));
                return phrase.map((_, li) => {
                  const lineToks = wp.filter(t => t.line === li);
                  return (
                    <div key={li} style={{ marginBottom:6 }}>
                      {lineToks.map((tok, ti) => {
                        if (tok.space) return <span key={ti}>{tok.text}</span>;
                        const c = WORD_COLORS[tok.cat] || T.n400;
                        return <span key={ti} style={{ color:c }}>{tok.text}</span>;
                      })}
                    </div>
                  );
                });
              })()}
            </div>
          </div>

          {/* Audio mixer: guide vocals + your recording */}
          <GoDeepMixer/>

          {/* Bottom buttons */}
          <div style={{ display:'flex',gap:10,marginTop:12,flexShrink:0 }}>
            <div onPointerUp={()=>{setShowLyricBreakdown(false);listenAgain();}}
              style={{ flex:1,height:50,borderRadius:14,cursor:'pointer',
                background:'white',border:`2px solid ${T.n200}`,
                display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
              <span style={{ fontSize:15 }}>🎧</span>
              <span style={{ fontFamily:'Nunito',fontSize:14,fontWeight:900,color:T.n700 }}>Listen</span>
            </div>
            <div onPointerUp={()=>{setShowLyricBreakdown(false);retry();}}
              style={{ flex:2,height:50,borderRadius:14,cursor:'pointer',
                background:`linear-gradient(180deg,#FF7A10,${T.brand600})`,
                display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                boxShadow:`0 6px 18px rgba(255,105,0,0.4)` }}>
              <span style={{ fontSize:15 }}>↻</span>
              <span style={{ fontFamily:'Nunito',fontSize:15,fontWeight:900,color:'white' }}>Retry</span>
            </div>
          </div>
        </div>
        );
      })()}

      {/* ── Bottom action buttons ── */}
      <div style={{ position:'absolute',bottom:0,left:0,right:0,
        padding:'0 20px 20px',
        background:'linear-gradient(transparent, rgba(250,250,250,0.95) 30%)',
        display:'flex',gap:10,alignItems:'center',
        opacity: buttonsVisible ? 1 : 0,
        transform: buttonsVisible ? 'translateY(0)' : 'translateY(16px)',
        transition:'opacity 180ms ease, transform 180ms ease',
        pointerEvents: buttonsVisible ? 'auto' : 'none',
        zIndex:10 }}>
        <div onPointerUp={() => { if (step === 'listenPlay') setListenPlaying(p=>!p); else listenAgain(); }}
          style={{ flex:1,height:50,borderRadius:14,cursor:'pointer',
            background:'white',border:`2px solid ${T.n200}`,
            display:'flex',alignItems:'center',justifyContent:'center',gap:6,
            boxShadow:'0 2px 10px rgba(0,0,0,0.06)' }}>
          <span style={{ fontSize:15 }}>🎧</span>
          <span style={{ fontFamily:'Nunito',fontSize:14,fontWeight:900,color:T.n700 }}>Listen</span>
        </div>
        <div onPointerUp={() => { if (step !== 'sing' && step !== 'feedback') eng.startSinging(); }}
          style={{ flex:2,height:50,borderRadius:14,cursor:'pointer',
            background:`linear-gradient(180deg,#FF7A10,${T.brand600})`,
            display:'flex',alignItems:'center',justifyContent:'center',gap:6,
            boxShadow:`0 8px 24px ${T.brand600}40` }}>
          <span style={{ fontSize:16 }}>🎤</span>
          <span style={{ fontFamily:'Nunito',fontSize:15,fontWeight:900,color:'white' }}>Sing</span>
        </div>
      </div>
    </div>
  );
}

/* ── VINYL — phrases as slices of a record. Slice fills green
   when the phrase is solid, the needle drops on the active
   slice, and attempts gather as concentric "track rings". The
   verse is the whole record — once every slice is filled, the
   centre stamps "VERSE". ──────────────────────────────────── */
function GymVinylLayout({ song, section, eng }) {
  const { phrases, idx, step, phrase, phraseStatus, verseMastery, verseLocked,
    selectPhrase, lastScore, lastDelta, scoreHistory } = eng;
  const N = phrases.length;
  const cx = 130, cy = 130, R = 110, IR = 30;
  const sliceArc = (i) => {
    const a1 = -Math.PI/2 + (i/N)*2*Math.PI;
    const a2 = -Math.PI/2 + ((i+1)/N)*2*Math.PI;
    const p1 = { x: cx + R*Math.cos(a1), y: cy + R*Math.sin(a1) };
    const p2 = { x: cx + R*Math.cos(a2), y: cy + R*Math.sin(a2) };
    const q2 = { x: cx + IR*Math.cos(a2), y: cy + IR*Math.sin(a2) };
    const q1 = { x: cx + IR*Math.cos(a1), y: cy + IR*Math.sin(a1) };
    const large = (a2 - a1) > Math.PI ? 1 : 0;
    return `M ${p1.x} ${p1.y} A ${R} ${R} 0 ${large} 1 ${p2.x} ${p2.y} L ${q2.x} ${q2.y} A ${IR} ${IR} 0 ${large} 0 ${q1.x} ${q1.y} Z`;
  };
  const labelPos = (i) => {
    const aMid = -Math.PI/2 + ((i+0.5)/N)*2*Math.PI;
    const r = (R + IR) / 2;
    return { x: cx + r*Math.cos(aMid), y: cy + r*Math.sin(aMid) };
  };
  const needleAngle = -Math.PI/2 + ((idx+0.5)/N)*2*Math.PI;
  return (
    <div style={{ height:'100%',display:'flex',flexDirection:'column',padding:'6px 12px 12px',animation:'fadeUp 0.3s both',overflowY:'auto' }}>
      {/* Vinyl */}
      <div style={{ flexShrink:0,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:6 }}>
        <svg width="260" height="280" viewBox="0 0 260 280">
          <g style={{ animation: step==='sing' ? 'spin 4s linear infinite' : 'none', transformOrigin:`${cx}px ${cy}px` }}>
            {phrases.map((_, i) => {
              const st = phraseStatus[i];
              const active = i === idx;
              const fill = st === 'solid' ? T.success : '#FCA5A5';
              const op = st === 'solid' ? 1 : 0.85;
              const stroke = active ? T.brand600 : 'rgba(255,255,255,0.7)';
              return (
                <path key={i} d={sliceArc(i)} fill={fill} opacity={op}
                  stroke={stroke} strokeWidth={active ? 3 : 1}
                  onPointerUp={()=>selectPhrase(i)} style={{ cursor:'pointer' }}/>
              );
            })}
            {/* groove rings */}
            {[88, 70, 52].map((r, i)=>(
              <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke="rgba(0,0,0,0.18)" strokeWidth="0.7"/>
            ))}
            {/* slice numbers */}
            {phrases.map((_, i) => {
              const p = labelPos(i);
              const st = phraseStatus[i];
              return (
                <text key={i} x={p.x} y={p.y+5} textAnchor="middle"
                  style={{ fontFamily:'Nunito',fontSize:15,fontWeight:900,
                    fill: st === 'solid' ? 'white' : T.error,pointerEvents:'none' }}>
                  {i+1}
                </text>
              );
            })}
            {/* centre label */}
            <circle cx={cx} cy={cy} r={IR} fill={verseLocked ? T.success : '#1A1A1A'}/>
            <text x={cx} y={cy-3} textAnchor="middle"
              style={{ fontFamily:'Nunito',fontSize:9,fontWeight:900,fill:'white',letterSpacing:0.4 }}>
              {verseLocked ? '✓ VERSE' : 'VERSE'}
            </text>
            <text x={cx} y={cy+11} textAnchor="middle"
              style={{ fontFamily:'Nunito',fontSize:13,fontWeight:900,fill:'white' }}>
              {verseMastery}%
            </text>
          </g>
          {/* needle (outside spinning group) */}
          <g transform={`rotate(${(needleAngle*180/Math.PI)+90} ${cx} 4)`}
             style={{ transition:'transform 380ms cubic-bezier(0.4,1.4,0.5,1)' }}>
            <line x1={cx} y1="6" x2={cx} y2={cy-12} stroke="#1A1A1A" strokeWidth="3" strokeLinecap="round"/>
            <circle cx={cx} cy={cy-12} r="6" fill={step==='sing'?T.error:T.brand600}
              style={{ animation: step==='sing' ? 'pulseGlow 1s ease-in-out infinite' : 'none' }}/>
            <circle cx={cx} cy="6" r="5" fill="#1A1A1A"/>
          </g>
        </svg>
      </div>

      {/* Track card */}
      <div style={{ background:'white',borderRadius:18,padding:'14px',
        border: step==='sing' ? `2px solid ${T.error}`
              : step==='listenPlay' ? `2px solid ${T.brand400}` : `2px solid ${T.n100}`,
        boxShadow:'0 4px 14px rgba(0,0,0,0.05)' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8 }}>
          <div style={{ fontFamily:'Nunito',fontSize:11,fontWeight:900,color:T.brand700,letterSpacing:0.6,textTransform:'uppercase' }}>
            Track {idx+1} of {N} · {section.label}
          </div>
          <DeltaBadge delta={lastDelta} lastScore={lastScore}/>
        </div>
        <div style={{ marginBottom:10 }}>
          {phrase.map((line, li)=>(
            <div key={li} style={{ marginBottom:5 }}>{colorizeLine(line, li, eng, {fontSize:15})}</div>
          ))}
        </div>
        <GymStepControls eng={eng} compact/>
        {(scoreHistory[idx]||[]).length > 0 && (
          <div style={{ marginTop:10,display:'flex',alignItems:'center',gap:8 }}>
            <span style={{ fontFamily:'Nunito',fontSize:9,fontWeight:900,color:T.n400,letterSpacing:0.5 }}>
              ATTEMPTS
            </span>
            <div style={{ display:'flex',gap:5,flexWrap:'wrap' }}>
              {(scoreHistory[idx]||[]).map((s,si)=>(
                <div key={si} style={{ width:18,height:18,borderRadius:'50%',
                  border:`2px solid ${s>=70?T.success:s>=40?T.warning:T.error}`,
                  background: si === scoreHistory[idx].length-1 ? (s>=70?T.success:s>=40?T.warning:T.error) : 'white',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontFamily:'Nunito',fontSize:9,fontWeight:900,
                  color: si === scoreHistory[idx].length-1 ? 'white' : (s>=70?T.success:s>=40?T.warning:T.error) }}>
                  {s}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                              <span style={{ fontSize:10, fontWeight:900, color:'#FF9A3C' }}>+{FAN_REWARDS.drill}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ));
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   SCREEN 5 — SCORE
══════════════════════════════════════════════════════════════ */
const SCORE_SECTIONS = [
  { label:'Verse 1',  score:22, color:T.warning },
  { label:'Chorus',   score:15, color:T.error   },
  { label:'Verse 2',  score:31, color:T.warning  },
  { label:'Bridge',   score:8,  color:T.error    },
];

function DonutChart({ pct=15, size=140, stroke=14 }) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, offset=circ-(pct/100)*circ;
  return (
    <svg width={size} height={size} style={{ transform:'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.n200} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#bGrad)"
        strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={offset}
        style={{ animation:'dashFill 1.2s cubic-bezier(0.34,1.56,0.64,1) both' }}/>
      <defs>
        <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor={T.brand400}/><stop offset="100%" stopColor={T.brand600}/>
        </linearGradient>
      </defs>
    </svg>
  );
}

function ScoreScreen({ onNav, onBack, song }) {

  return (

          <div style={{ fontFamily:'Nunito',fontSize:15,fontWeight:800,color:T.n700 }}>Practice Results</div>

        </div>
      </div>
      <div style={{ flex:1,overflowY:'auto' }}>
        {/* Score hero */}
        <div style={{ margin:'4px 14px 12px',background:'white',borderRadius:24,
          padding:'24px',boxShadow:'0 4px 20px rgba(0,0,0,0.08)',
          display:'flex',flexDirection:'column',alignItems:'center',animation:'popIn 0.5s both' }}>
          <div style={{ position:'relative',marginBottom:4 }}>
            <DonutChart pct={15}/>
            <div style={{ position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center' }}>
              <div style={{ fontFamily:'Nunito',fontSize:36,fontWeight:900,color:T.n950,animation:'countUp 0.8s 0.4s both' }}>15%</div>
              <div style={{ fontFamily:'Nunito',fontSize:11,fontWeight:800,color:T.n400,letterSpacing:0.5,textTransform:'uppercase' }}>pitch match</div>
            </div>
          </div>
          <div style={{ textAlign:'center',marginTop:8 }}>
            <div style={{ fontFamily:'Nunito',fontSize:17,fontWeight:900,color:T.n950 }}>{song?.title||'Dancing Queen'}</div>
            <div style={{ fontFamily:'Nunito',fontSize:13,fontWeight:600,color:T.n500,marginTop:2 }}>{song?.artist||'ABBA'}</div>
          </div>
          <div style={{ marginTop:14,padding:'12px 16px',borderRadius:14,background:T.brand50,
            border:`1.5px solid ${T.brand200}`,width:'100%' }}>
            <div style={{ fontFamily:'Nunito',fontSize:13,fontWeight:700,color:T.brand800,lineHeight:1.5,textAlign:'center' }}>
              Keep going! Focus on the chorus — your pitch accuracy will improve with consistent short sessions. 💪
            </div>
          </div>
        </div>
        {/* Section breakdown */}
        <div style={{ margin:'0 14px 12px',background:'white',borderRadius:22,padding:'18px',boxShadow:'0 2px 12px rgba(0,0,0,0.06)' }}>
          <div style={{ fontSize:12,fontWeight:900,color:T.n400,letterSpacing:0.8,textTransform:'uppercase',marginBottom:14 }}>Section Breakdown</div>
          {SCORE_SECTIONS.map((sec,i)=>(
            <div key={sec.label} onClick={()=>setFocus(sec.label)}
              style={{ display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:14,marginBottom:6,cursor:'pointer',
                background:focus===sec.label?T.brand50:'transparent',
                border:`2px solid ${focus===sec.label?T.brand300:'transparent'}`,
                transition:'all 200ms ease',animation:`fadeUp 0.4s ${i*60}ms both` }}>
              <div style={{ width:52,fontFamily:'Nunito',fontSize:12,fontWeight:800,color:T.n700,flexShrink:0 }}>{sec.label}</div>
              <div style={{ flex:1,height:8,borderRadius:99,background:T.n100,overflow:'hidden' }}>
                <div style={{ height:'100%',borderRadius:99,background:`linear-gradient(90deg,${sec.color}99,${sec.color})`,
                  width:`${sec.score}%`,transition:'width 800ms cubic-bezier(0.34,1.56,0.64,1)' }}/>
              </div>
              <div style={{ width:36,textAlign:'right',fontFamily:'Nunito',fontSize:13,fontWeight:900,color:sec.color,flexShrink:0 }}>{sec.score}%</div>
            </div>
          ))}
        </div>
        {focus && (() => {
          const sec = SCORE_SECTIONS.find(s=>s.label===focus);
          return (
            <div style={{ margin:'0 14px 14px',background:'white',borderRadius:22,padding:'18px',boxShadow:'0 2px 12px rgba(0,0,0,0.06)',animation:'popIn 0.3s both' }}>
              <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:10 }}>
                <div style={{ width:8,height:8,borderRadius:'50%',background:sec.color,flexShrink:0 }}/>
                <div style={{ fontFamily:'Nunito',fontSize:14,fontWeight:900,color:T.n950 }}>{sec.label} — {sec.score}% match</div>
              </div>
              <div style={{ fontFamily:'Nunito',fontSize:13,fontWeight:600,color:T.n600,lineHeight:1.6 }}>
                Your timing was off by about 0.4 beats. Try slowing down and locking in the melody line first. Breath support will help here.
              </div>
            </div>
          );
        })()}
        <div style={{ height:8 }}/>
      </div>
      <div style={{ padding:'8px 16px 24px',display:'flex',flexDirection:'column',gap:9 }}>
        <RaisedBtn label="Practice again" onPress={onBack}/>
        <RaisedBtn label="Back to song" secondary onPress={()=>onNav('sections')}/>
      </div>
    </div>
  );
}

Object.assign(window, {
  T, ALL_SONGS, DIFF, KEYS, SECTIONS_BY_ID, DEFAULT_SECTIONS, semitonesDiff,
  MODES, STREAK_CHECKPOINTS, ZEKE_MESSAGES, BADGE_QUESTS_INIT,
  FAN_REWARDS, SUPERFAN_DEFS, COACH_LEVELS, COACH_GOAL_MINUTES,
  ARCADE_GAMES, ARCADE_DRILLS, TODAY_ACTIVITIES,
  ZekeFace, ZekeBadge, GameyTick, StreakTimeline, HudBar, HudDetailSheet,
  HomeScreen, MySongsScreen, AddSongsScreen, SectionsScreen, ArcadeScreen, ScoreScreen,
  PracticeStudio, ListenMode, SingMode, GymMode,
  AlbumArt, BackBtn, RaisedBtn,
});

</script>
  <style>

    @keyframes todayDone    { 0% { transform: scale(1); opacity:1; } 30% { transform: scale(1.03); background:#E8F5E9; } 100% { transform: scale(0.9) translateX(60px); opacity:0; height:0; padding:0; margin:0; overflow:hidden; } }
    @keyframes recPulse     { 0%,100% { box-shadow: 0 0 0 4px rgba(185,28,28,0.13), 0 2px 10px rgba(0,0,0,0.05); } 50% { box-shadow: 0 0 0 7px rgba(185,28,28,0.22), 0 2px 14px rgba(185,28,28,0.25); } }

    @keyframes bonusShrink { 0% { transform: scale(1); } 100% { transform: scale(0.7); } }
    @keyframes bonusFlyUp { 0% { transform: scale(0.7) translateY(0); opacity:1; } 100% { transform: scale(0.3) translateY(-55px); opacity:0; } }
    @keyframes fansBump { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Navigation shell ──────────────────────────────────────── */
function NavShell() {
  const [projects, setProjects] = useState([
    { ...ALL_SONGS[0] },
    { ...ALL_SONGS[1] },
    { ...ALL_SONGS[2] },
  ]);

  // V4 Economy state
  const [fans, setFans] = useState(32);
  const [superfans, setSuperfans] = useState([
    { ...SUPERFAN_DEFS[0], customName: null },
  ]);
  const [sungMinutesThisWeek, setSungMinutesThisWeek] = useState(42);
  const [coachReviewsEarned, setCoachReviewsEarned] = useState(0);
  const [currentStreak, setCurrentStreak] = useState(11);

  const addFans = useCallback((amount) => {
    setFans(f => f + amount);
    setSungMinutesThisWeek(m => m + (amount / 5));
  }, []);

  const addSuperfan = useCallback(() => {
    setSuperfans(prev => {
      const next = SUPERFAN_DEFS.find(sf => !prev.some(p => p.id === sf.id));
      if (!next) return prev;
      return [...prev, { ...next, customName: null }];
    });
  }, []);

  const addMinutes = useCallback((mins) => {
    setSungMinutesThisWeek(m => {
      const newM = m + mins;
      if (m < COACH_GOAL_MINUTES && newM >= COACH_GOAL_MINUTES) {
        setCoachReviewsEarned(c => c + 1);
      }
      return newM;
    });
  }, []);

  const initialScreen = (() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const start = params.get('start');
      if (start === 'drills') return 'arcade';
      if (['home','mySongs','addSongs','arcade','score'].includes(start)) return start;
    } catch (e) {}
    return 'home';
  })();
  const [stack, setStack] = useState([{ screen: initialScreen, props: {} }]);
  const [dir, setDir] = useState('forward');
  const [prevEntry, setPrevEntry] = useState(null);
  const transTimer = React.useRef(null);

  const cur = stack[stack.length - 1];

  const push = useCallback((screen, props = {}) => {
    setDir('forward');
    setPrevEntry(cur);
    setStack(s => [...s, { screen, props }]);
    clearTimeout(transTimer.current);
    transTimer.current = setTimeout(() => setPrevEntry(null), 320);
  }, [cur]);

  const pop = useCallback(() => {
    if (stack.length <= 1) return;
    setDir('back');
    setPrevEntry(cur);
    setStack(s => s.slice(0, -1));
    clearTimeout(transTimer.current);
    transTimer.current = setTimeout(() => setPrevEntry(null), 320);
  }, [stack, cur]);

  const sharedProps = { onNav: push, onBack: pop, projects, setProjects };

  const homeProps = {
    ...sharedProps,
    fans, superfans, sungMinutesThisWeek, coachReviewsEarned, currentStreak,
    onDebugAddFans: addFans,
    onDebugAddSuperfan: addSuperfan,
    onDebugAddMinutes: addMinutes,
  };

  function renderScreen(entry) {
    const s = entry.screen, p = entry.props;
    if (s === 'home')     return <HomeScreen     {...homeProps} />;
    if (s === 'mySongs')  return <MySongsScreen  {...sharedProps} />;
    if (s === 'addSongs') return <AddSongsScreen {...sharedProps} />;
    if (s === 'sections') return <SectionsScreen {...sharedProps} song={p.song || projects[0]} />;
    if (s === 'arcade')   return <ArcadeScreen   {...sharedProps} />;
    if (s === 'score')    return <ScoreScreen    {...sharedProps} song={p.song || projects[0]} />;
    return null;
  }

  const curKey = stack.map(s => s.screen).join('-');
  const anim = dir === 'forward' ? 'slideInRight' : 'slideInLeft';
  const exitAnim = dir === 'forward' ? 'navExitLeft' : 'navExitRight';

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', overflow: 'hidden' }}>
      {prevEntry && (
        <div key={curKey + '-exit'} style={{ position: 'absolute', inset: 0, zIndex: 0,
          animation: `${exitAnim} 300ms cubic-bezier(0.25,0.46,0.45,0.94) both`, pointerEvents: 'none' }}>
          {renderScreen(prevEntry)}
        </div>
      )}
      <div key={curKey} style={{ position: 'absolute', inset: 0, zIndex: 1,
        animation: stack.length > 1 || prevEntry ? `${anim} 300ms cubic-bezier(0.25,0.46,0.45,0.94) both` : 'none' }}>
        {renderScreen(cur)}
      </div>
    </div>
  );
}

/* ── Root ──────────────────────────────────────────────────── */
const ROOT_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showLabel": true
}/*EDITMODE-END*/;

function App() {
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(ROOT_TWEAK_DEFAULTS);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const T_local = window.T;

  return (
    <div style={{ width: '100vw', height: '100dvh', overflow: 'hidden',
      background: '#0A0A0A', position: 'relative' }}>
      <NavShell />

      {tweaksOpen && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: 'white',
          borderRadius: 20, padding: 20, width: 220,
          boxShadow: '0 12px 48px rgba(0,0,0,0.16)', fontFamily: 'Nunito', zIndex: 9999 }}>
          <div style={{ fontSize: 14, fontWeight: 900, color: '#0A0A0A', marginBottom: 14 }}>Tweaks</div>
          <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
            fontSize: 13, fontWeight: 700, color: '#404040' }}>
            <input type="checkbox" checked={tweaks.showLabel} onChange={e => {
              const v = { ...tweaks, showLabel: e.target.checked };
              setTweaks(v);
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: v }, '*');
            }}/>
            Show screen label
          </label>
        </div>
      )}
    </div>
  );
}

// Wait for external Babel scripts (ios-frame.jsx, jukebox-screens.jsx) to
// finish transpiling & executing before mounting — otherwise IOSDevice /
// NavShell / T won't be on window yet and App throws a ReferenceError.
function mountWhenReady() {
  if (window.IOSDevice && window.T && window.ALL_SONGS) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(mountWhenReady, 30);
  }
}
mountWhenReady();
</script>
</body>
