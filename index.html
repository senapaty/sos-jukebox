  @keyframes speechIn { 0% { transform:scale(0) translateY(10px); opacity:0; } 60% { transform:scale(1.05) translateY(-2px); } 100% { transform:scale(1) translateY(0); opacity:1; } }

// Level thresholds: superfans needed to reach each bar level
const LEVEL_THRESHOLDS = [0, 1, 2, 4, 6, 8, 10, 13, 16, 20];
function getBarLevel(superfanCount) {
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (superfanCount >= LEVEL_THRESHOLDS[i]) return i + 1;
  }
  return 1;
}

// Character sprites — using originals for now (milestone art TBD)
function getCharSprite(who) {
  return who === 'zeke' ? 'zeke-standing.webp' : 'stu-arms-crossed.webp';
}

const FAN_REWARDS = { fullSong:25, section:10, drill:5, arcade:8 };
const COACH_GOAL_MINUTES = 60;

// ── iOS wrapper ──
function IOSDevice({ children }) {
  return (
    <div style={{ display:'flex', justifyContent:'center', alignItems:'stretch',
      height:'100dvh', width:'100vw', background:'#1a1008', overflow:'hidden' }}>
      <div style={{ width:'min(393px, 100vw)', height:'100dvh', overflow:'hidden',
        position:'relative', boxSizing:'border-box', background:'#1a1008' }}>
        {children}
      </div>
    </div>
  );
}

// ── HUD capsule (fans + tier + weekly vocal coach) ──
function HUD({ fans, superfans, weeklyMins, weeklyGoal, onTap }) {
  const lvl = getBarLevel(superfans.length);
  const pct = Math.min(100, Math.round((weeklyMins / weeklyGoal) * 100));
  const press = e => e.currentTarget.style.transform = 'scale(0.93)';
  const release = e => e.currentTarget.style.transform = 'scale(1)';
  const sep = <div style={{ width:1, height:20, background:'rgba(255,255,255,0.10)' }} />;
  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:10,
      padding:'12px 12px 10px',
      background:'linear-gradient(to bottom, rgba(15,8,2,0.96) 0%, rgba(15,8,2,0.75) 70%, transparent 100%)' }}>
      <div onClick={() => onTap?.('barlevel')}
        onPointerDown={press} onPointerUp={release} onPointerLeave={release}
        style={{
          display:'inline-flex', alignItems:'center', gap:10,
          background:'rgba(18,10,4,0.9)', border:`1px solid ${T.hudBorder}`,
          borderRadius:22, padding:'8px 14px',
          boxShadow:'0 6px 18px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,180,80,0.08)',
          backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)',
          cursor:'pointer', transition:'transform 120ms ease',
        }}>
        <span style={{ fontSize:14 }}>👥</span>
        <span style={{ fontSize:17, fontWeight:900, color:T.gold }}>{fans}</span>

        {sep}

        <div style={{
          padding:'3px 9px', borderRadius:10,
          background:'linear-gradient(135deg, rgba(255,105,0,0.25), rgba(255,200,50,0.15))',
          border:'1px solid rgba(255,180,80,0.3)',
        }}>
          <span style={{ fontSize:11, fontWeight:900, color:T.gold, letterSpacing:0.3 }}>Tier {lvl}</span>
        </div>

        {sep}

        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ fontSize:12 }}>🎙️</span>
          <div style={{ width:48 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:2 }}>
              <span style={{ fontSize:8, fontWeight:900, color:T.muted, letterSpacing:0.3 }}>{weeklyMins}/{weeklyGoal}m</span>
            </div>
            <div style={{ height:4, borderRadius:2, background:'rgba(255,255,255,0.12)', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${pct}%`, borderRadius:2,

                  ? 'linear-gradient(90deg, #10B981, #34D399)'
                  : `linear-gradient(90deg, ${T.amber}, ${T.gold})` }} />
            </div>

}

// ── Character speech bubble ──
function SpeechBubble({ text, side, color, onDismiss }) {
  if (!text) return null;
  return (
    <div onPointerUp={onDismiss} style={{
      position:'absolute',
      bottom:'100%', marginBottom:8,
      [side === 'left' ? 'left' : 'right']: -10,
      background:'rgba(255,255,245,0.95)', borderRadius:14, padding:'10px 14px',
      maxWidth:200, boxShadow:'0 4px 16px rgba(0,0,0,0.3)',
      animation:'speechIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both',
      cursor:'pointer', userSelect:'none',
      zIndex:20,
    }}>
      <div style={{ fontSize:12, fontWeight:700, color:'#2a1a08', lineHeight:1.4 }}>{text}</div>
      <div style={{
        position:'absolute', bottom:-6,
        [side === 'left' ? 'left' : 'right']: 20,
        width:12, height:12, background:'rgba(255,255,245,0.95)',
        transform:'rotate(45deg)', borderRadius:2,
      }} />
    </div>
  );
}

// ── Cut-scene overlay ──
function CutScene({ superfan, onClose }) {
  if (!superfan) return null;
  const text = CUTSCENES[superfan.id] || 'A new fan walks through the door...';
  return (
    <div style={{ position:'absolute', inset:0, zIndex:200, display:'flex', flexDirection:'column',
      justifyContent:'center', alignItems:'center' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0,
        background:'rgba(0,0,0,0.85)', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)' }} />
      <div style={{ position:'relative', zIndex:1, display:'flex', flexDirection:'column',
        alignItems:'center', padding:'32px 28px', maxWidth:320,
        animation:'popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both' }}>
        <div style={{ width:100, height:100, borderRadius:'50%', overflow:'hidden',
          border:`3px solid ${superfan.color}`, boxShadow:`0 0 30px ${superfan.color}55`,
          marginBottom:16 }}>
          <img src={superfan.img} alt={superfan.name}
            style={{ width:'100%', height:'100%', objectFit:'cover' }} />
        </div>
        <div style={{ fontSize:20, fontWeight:900, color:T.white, marginBottom:4, textAlign:'center' }}>
          {superfan.name}
        </div>
        <div style={{ fontSize:11, fontWeight:800, color:superfan.color, textTransform:'uppercase',
          letterSpacing:1, marginBottom:16 }}>New OG Unlocked</div>
        <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.75)', lineHeight:1.7,
          textAlign:'center', marginBottom:24 }}>{text}</div>
        <div onClick={onClose} style={{
          padding:'10px 32px', borderRadius:12, cursor:'pointer',
          background:`linear-gradient(135deg, ${superfan.color}, ${superfan.color}cc)`,
          boxShadow:`0 4px 16px ${superfan.color}44`,
          fontSize:13, fontWeight:900, color:'white', letterSpacing:0.3,
        }}>Nice</div>
      </div>
    </div>
  );
}

// ── HUD Detail Sheet ──

  const lvl = getBarLevel(superfans.length);
  const nextThresh = lvl < 10 ? LEVEL_THRESHOLDS[lvl] : null;
  return (
    <div style={{ position:'absolute', inset:0, zIndex:100 }}>
      <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.55)',
        backdropFilter:'blur(4px)', WebkitBackdropFilter:'blur(4px)' }} onClick={onClose} />

        borderRadius:'24px 24px 0 0', padding:'20px 20px 40px', maxHeight:'75%', overflowY:'auto',

          <>

                boxShadow:'0 4px 16px rgba(255,105,0,0.2)' }}>
                <img src={`assets/bars/bar-level-${lvl}.jpg`} alt=""
                  style={{ width:'100%', height:'100%', objectFit:'cover' }} />
              </div>
              <div>
                <div style={{ fontSize:11, fontWeight:800, color:T.muted, textTransform:'uppercase',
                  letterSpacing:0.8, marginBottom:2 }}>Stu's Bar</div>
                <div style={{ fontSize:28, fontWeight:900, color:T.white }}>Tier {lvl}</div>
              </div>
            </div>

            <div style={{ display:'flex', gap:12, marginBottom:18 }}>
              <div style={{ flex:1, padding:'12px 14px', borderRadius:14,
                background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.06)' }}>

                <div style={{ fontSize:10, fontWeight:800, color:T.muted, textTransform:'uppercase',
                  letterSpacing:0.6, marginBottom:4 }}>OG's Found</div>
                <div style={{ fontSize:22, fontWeight:900, color:T.amber }}>{superfans.length}<span style={{ fontSize:14, color:T.muted }}>/{SUPERFAN_DEFS.length}</span></div>
              </div>
            </div>

            {nextThresh ? (
              <div style={{ marginBottom:20 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                  <span style={{ fontSize:11, fontWeight:800, color:T.muted, textTransform:'uppercase', letterSpacing:0.5 }}>
                    Next: Tier {lvl + 1}
                  </span>
                  <span style={{ fontSize:12, fontWeight:900, color:T.gold }}>
                    {superfans.length}/{nextThresh} OG's

                </div>
                <div style={{ height:8, borderRadius:4, background:'rgba(255,255,255,0.08)', overflow:'hidden' }}>
                  <div style={{ height:'100%', borderRadius:4, width:`${pctToNext}%`,

                </div>

                <span style={{ fontSize:13, fontWeight:800, color:T.gold }}>Max tier reached — legendary status!</span>
              </div>
            )}

            <div style={{ padding:'16px', borderRadius:14, marginBottom:18,
              background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.06)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>

                  width:`${Math.min(100,(weeklyMins/COACH_GOAL_MINUTES)*100)}%`,

                <div style={{ fontSize:11, fontWeight:600, color:T.muted, marginTop:6 }}>

            {[
              { label:'Full song', fans:FAN_REWARDS.fullSong, icon:'🎤' },
              { label:'Section practice', fans:FAN_REWARDS.section, icon:'🎵' },
              { label:'Arcade game', fans:FAN_REWARDS.arcade, icon:'🕹️' },

// ── Drag hook — tap vs drag with 5px threshold ──
function useDrag(onTap) {
  const posRef = React.useRef({ x: 0, y: 0 });
  const [pos, setPos] = React.useState({ x: 0, y: 0 });
  const dragState = React.useRef(null);
  const tapCb = React.useRef(onTap);
  tapCb.current = onTap;

  const onPointerDown = React.useCallback((e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    dragState.current = { sx: e.clientX, sy: e.clientY, ox: posRef.current.x, oy: posRef.current.y, moved: false };
  }, []);
  const onPointerMove = React.useCallback((e) => {
    const d = dragState.current;
    if (!d) return;
    const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
    if (!d.moved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) d.moved = true;
    if (d.moved) {
      const next = { x: d.ox + dx, y: d.oy + dy };
      posRef.current = next;
      setPos(next);
    }
  }, []);
  const onPointerUp = React.useCallback(() => {
    const d = dragState.current;
    dragState.current = null;
    if (d && !d.moved && tapCb.current) tapCb.current();
  }, []);

  return { pos, onPointerDown, onPointerMove, onPointerUp };
}

        window.removeEventListener('pointerdown', unlock, true);

      <div style={{ display:'flex', flexDirection:'column', height:'100%', background:T.bg, minHeight:0 }}>
        <div style={{ flex:'1 1 auto', minHeight:0, position:'relative', overflow:'hidden' }}>
          {tab === 'home' && <BarHome fans={fans} superfans={superfans} weeklyMins={weeklyMins} onGoTab={goTab} />}
          {tab === 'jukebox' && <JukeboxScreen />}
          {tab === 'arcade' && <ArcadeScreen />}
          {tab === 'drills' && <DrillsScreen />}
          {tab === 'profile' && <ProfileScreen />}
        </div>
        <BottomNav active={tab} onTap={setTab} />
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
