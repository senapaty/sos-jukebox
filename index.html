<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>SOS — Jukebox Flow v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body, #root { height:100%; width:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:#1a1008; }
  @keyframes popIn { 0% { transform:scale(0.9); opacity:0; } 60% { transform:scale(1.03); } 100% { transform:scale(1); opacity:1; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes clipGlow { 0%,100% { filter:drop-shadow(0 0 8px rgba(255,180,50,0.4)); } 50% { filter:drop-shadow(0 0 18px rgba(255,180,50,0.8)); } }
  @keyframes floatY { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
  @keyframes speechIn { 0% { transform:scale(0) translateY(10px); opacity:0; } 60% { transform:scale(1.05) translateY(-2px); } 100% { transform:scale(1) translateY(0); opacity:1; } }
  @keyframes sheetUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
  @keyframes charBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

// ── Theme ──
const T = {
  bg: '#1a1008',
  hudBg: 'rgba(20,12,4,0.65)',
  hudBorder: 'rgba(255,180,80,0.15)',
  gold: '#FFD93D',
  amber: '#FF9A3C',
  brand: '#FF6900',
  white: '#FFFEF5',
  muted: 'rgba(255,255,255,0.5)',
  dim: 'rgba(255,255,255,0.25)',
};

// ── Data ──
const TODAY_TASKS = [
  { id:'t1', label:'Practice Chorus', sub:'Mr. Brightside', icon:'🎤', fans:10, tab:'jukebox' },
  { id:'t2', label:'Play Steady Shred', sub:'Beat your high score', icon:'🛹', fans:8, tab:'arcade' },
  { id:'t3', label:'Hiss on the Beat', sub:'2 min breath drill', icon:'💨', fans:5, tab:'drills' },
];

const ZEKE_QUIPS = [
  "Hey, you showed up! That's already half the battle won.",
  "I believe in you, kid. The stage is yours whenever you're ready.",
  "Every great singer started exactly where you are. Keep going!",
  "You're sounding better every time. The regulars are noticing.",
  "Don't worry about being perfect. Just be loud and honest.",
  "The mic doesn't judge. Neither do I. Well, maybe a little.",
  "You've got something special. Let's bring it out today.",
  "Rome wasn't built in a day, and neither is a great voice. But you're getting there!",
];

const STU_QUIPS = [
  "Are you gonna sing or just stand there warming my bar stool?",
  "I've heard cats fight with more melody. Prove me wrong.",
  "Oh great, you're back. My ears were just recovering.",
  "This bar has a two-drink minimum. Or two songs. Your choice.",
  "I didn't open a bar to babysit singers. Get on that stage.",
  "The jukebox plays better than you. For now.",
  "Less talking, more singing. I'm not running a book club.",
  "You want encouragement? Talk to Zeke. You want the truth? Talk to me.",
];

const SUPERFAN_DEFS = [
  { id:'first_believer', name:'First Believer', avatar:'🧔', color:'#6BCB77',
    desc:'Your very first superfan — showed up after your debut' },
  { id:'melody_mel', name:'Melody Mel', avatar:'👩‍🎤', color:'#FF9A3C',
    desc:'Loves a good tune — earned by scoring 70+ on a full song' },
  { id:'pitch_pete', name:'Pitch Pete', avatar:'🎸', color:'#4776E6',
    desc:'Only shows up for real singers — score 80+ on a full song' },
  { id:'encore_enid', name:'Encore Enid', avatar:'💃', color:'#DC2626',
    desc:'She came back for more — complete 3 full songs' },
  { id:'standing_o_sam', name:'Standing O Sam', avatar:'🕺', color:'#F59E0B',
    desc:'Stands and applauds — score 90+ on any full song' },
];

const FAN_REWARDS = { fullSong:25, section:10, drill:5, arcade:8 };
const COACH_GOAL_MINUTES = 60;

// ── iOS wrapper ──
function IOSDevice({ children }) {
  return (
    <div style={{ display:'flex', justifyContent:'center', alignItems:'stretch',
      height:'100dvh', width:'100vw', background:'#1a1008', overflow:'hidden' }}>
      <div style={{ width:'min(393px, 100vw)', height:'100dvh', overflow:'hidden',
        position:'relative', boxSizing:'border-box', background:'#1a1008' }}>
        {children}
      </div>
    </div>
  );
}

// ── HUD bar (top overlay on bar scene) ──
function HUD({ fans, superfans, weeklyMins = 18, weeklyGoal = 60, onTap }) {
  const pct = Math.min(100, Math.round((weeklyMins / weeklyGoal) * 100));
  const secStyle = { cursor:'pointer', transition:'transform 120ms ease', display:'flex', alignItems:'center' };
  const press = e => e.currentTarget.style.transform = 'scale(0.93)';
  const release = e => e.currentTarget.style.transform = 'scale(1)';
  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:10,
      padding:'12px 12px 10px',
      background:'linear-gradient(to bottom, rgba(15,8,2,0.96) 0%, rgba(15,8,2,0.75) 70%, transparent 100%)' }}>
      <div style={{ display:'flex', alignItems:'center', gap:10,
        background:'rgba(18,10,4,0.9)', border:`1px solid ${T.hudBorder}`,
        borderRadius:22, padding:'10px 14px',
        boxShadow:'0 6px 18px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,180,80,0.08)',
        backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)' }}>
        <div onClick={() => onTap?.('fans')} onPointerDown={press} onPointerUp={release} onPointerLeave={release}
          style={{ ...secStyle, gap:5 }}>
          <span style={{ fontSize:16 }}>👥</span>
          <span style={{ fontSize:18, fontWeight:900, color:T.gold }}>{fans}</span>
          <span style={{ fontSize:9, fontWeight:800, color:T.muted, textTransform:'uppercase', letterSpacing:0.4 }}>Fans</span>
        </div>

        <div style={{ width:1, alignSelf:'stretch', background:'rgba(255,255,255,0.10)' }} />

        <div onClick={() => onTap?.('superfans')} onPointerDown={press} onPointerUp={release} onPointerLeave={release}
          style={{ ...secStyle, gap:4 }}>
          {SUPERFAN_DEFS.slice(0, 3).map(sf => {
            const earned = superfans.includes(sf.id);
            return <span key={sf.id} style={{ fontSize:15, filter: earned ? 'none' : 'grayscale(1) opacity(0.3)' }}>{sf.avatar}</span>;
          })}
          <span style={{ fontSize:15, fontWeight:900, color:T.amber }}>{superfans.length}</span>
          <span style={{ fontSize:9, fontWeight:800, color:T.muted, textTransform:'uppercase', letterSpacing:0.3 }}>Super</span>
        </div>

        <div style={{ width:1, alignSelf:'stretch', background:'rgba(255,255,255,0.10)' }} />

        <div onClick={() => onTap?.('minutes')} onPointerDown={press} onPointerUp={release} onPointerLeave={release}
          style={{ ...secStyle, flex:1, minWidth:0 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:6, marginBottom:3 }}>
              <span style={{ fontSize:9, fontWeight:900, color:T.muted, textTransform:'uppercase', letterSpacing:0.4, whiteSpace:'nowrap' }}>⏱ Weekly</span>
              <span style={{ fontSize:11, fontWeight:900, color:T.gold, whiteSpace:'nowrap' }}>{weeklyMins}/{weeklyGoal}m</span>
            </div>
            <div style={{ height:6, borderRadius:3, background:'rgba(255,255,255,0.12)', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${pct}%`, borderRadius:3,
                background:`linear-gradient(90deg, ${T.amber}, ${T.gold})` }} />
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Character speech bubble ──
function SpeechBubble({ text, side, color, onDismiss }) {
  if (!text) return null;
  return (
    <div onPointerUp={onDismiss} style={{
      position:'absolute',
      bottom:'100%', marginBottom:8,
      [side === 'left' ? 'left' : 'right']: -10,
      background:'rgba(255,255,245,0.95)', borderRadius:14, padding:'10px 14px',
      maxWidth:200, boxShadow:'0 4px 16px rgba(0,0,0,0.3)',
      animation:'speechIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both',
      cursor:'pointer', userSelect:'none',
      zIndex:20,
    }}>
      <div style={{ fontSize:12, fontWeight:700, color:'#2a1a08', lineHeight:1.4 }}>{text}</div>
      <div style={{
        position:'absolute', bottom:-6,
        [side === 'left' ? 'left' : 'right']: 20,
        width:12, height:12, background:'rgba(255,255,245,0.95)',
        transform:'rotate(45deg)', borderRadius:2,
      }} />
    </div>
  );
}

// ── HUD Detail Sheet (tapping fans / superfans / weekly) ──
function HudDetailSheet({ type, fans, superfans, weeklyMins, onClose }) {
  return (
    <div style={{ position:'absolute', inset:0, zIndex:100 }}>
      <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.55)',
        backdropFilter:'blur(4px)', WebkitBackdropFilter:'blur(4px)' }} onClick={onClose} />
      <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'#1a1008',
        borderRadius:'24px 24px 0 0', padding:'20px 20px 40px', maxHeight:'70%', overflowY:'auto',
        border:'1px solid rgba(255,180,80,0.15)', borderBottom:'none',
        animation:'sheetUp 0.32s cubic-bezier(0.34,1.56,0.64,1)' }}>
        <div style={{ width:36, height:4, borderRadius:2, background:'rgba(255,255,255,0.15)',
          margin:'0 auto 20px' }} />

        {type === 'fans' && (
          <>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
              <div style={{ width:48, height:48, borderRadius:14,
                background:'linear-gradient(135deg,#FF6900,#FFD93D)',
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:24,
                boxShadow:'0 4px 16px rgba(255,105,0,0.3)' }}>👥</div>
              <div>
                <div style={{ fontSize:28, fontWeight:900, color:T.white }}>{fans.toLocaleString()}</div>
                <div style={{ fontSize:12, fontWeight:700, color:T.muted }}>Total Fans</div>
              </div>
            </div>
            <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.6)', lineHeight:1.7, marginBottom:16 }}>
              Use your voice, get fans. Every singing action earns fans — full songs, sections, drills, and arcade games.
            </div>
            <div style={{ fontSize:11, fontWeight:800, color:T.muted, letterSpacing:0.8, textTransform:'uppercase', marginBottom:10 }}>How to earn</div>
            {[
              { label:'Full song', fans:FAN_REWARDS.fullSong, icon:'🎤' },
              { label:'Section practice', fans:FAN_REWARDS.section, icon:'🎵' },
              { label:'Arcade game', fans:FAN_REWARDS.arcade, icon:'🕹️' },
              { label:'Drill / exercise', fans:FAN_REWARDS.drill, icon:'💨' },
            ].map(r => (
              <div key={r.label} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 0',
                borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                <span style={{ fontSize:18 }}>{r.icon}</span>
                <span style={{ flex:1, fontSize:14, fontWeight:700, color:T.white }}>{r.label}</span>
                <span style={{ fontSize:13, fontWeight:900, color:T.brand }}>+{r.fans} fans</span>
              </div>
            ))}
          </>
        )}

        {type === 'superfans' && (
          <>
            <div style={{ fontSize:20, fontWeight:900, color:T.white, marginBottom:4 }}>Superfans</div>
            <div style={{ fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.5)', marginBottom:16, lineHeight:1.5 }}>
              Perform full songs to win superfans. Bring back the regulars of Stu's bar.
            </div>
            {SUPERFAN_DEFS.map(sf => {
              const earned = superfans.includes(sf.id);
              return (
                <div key={sf.id} style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 0',
                  borderBottom:'1px solid rgba(255,255,255,0.06)', opacity: earned ? 1 : 0.45 }}>
                  <div style={{ width:48, height:48, borderRadius:14, flexShrink:0,
                    background: earned ? `linear-gradient(135deg,${sf.color}22,${sf.color}44)` : 'rgba(255,255,255,0.06)',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:26,
                    border: earned ? `2px solid ${sf.color}40` : '2px solid rgba(255,255,255,0.06)',
                    filter: earned ? 'none' : 'grayscale(1)' }}>
                    {sf.avatar}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:900, color: earned ? T.white : T.muted }}>
                      {earned ? sf.name : '???'}
                    </div>
                    <div style={{ fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.4)', marginTop:2 }}>{sf.desc}</div>
                  </div>
                  {earned && <span style={{ fontSize:11, fontWeight:900, color:sf.color }}>Earned</span>}
                </div>
              );
            })}
          </>
        )}

        {type === 'minutes' && (
          <>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
              <div style={{ width:48, height:48, borderRadius:14,
                background:'linear-gradient(135deg,#047857,#10B981)',
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:24,
                boxShadow:'0 4px 16px rgba(4,120,87,0.3)' }}>🎙️</div>
              <div>
                <div style={{ fontSize:28, fontWeight:900, color:T.white }}>{Math.round(weeklyMins)} min</div>
                <div style={{ fontSize:12, fontWeight:700, color:T.muted }}>Sung this week</div>
              </div>
            </div>
            <div style={{ height:10, borderRadius:5, background:'rgba(255,255,255,0.08)', overflow:'hidden', marginBottom:8 }}>
              <div style={{ height:'100%', borderRadius:5,
                width:`${Math.min(100,(weeklyMins/COACH_GOAL_MINUTES)*100)}%`,
                background:'linear-gradient(90deg,#047857,#10B981)',
                transition:'width 600ms ease' }} />
            </div>
            <div style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.5)', marginBottom:20 }}>
              {weeklyMins >= COACH_GOAL_MINUTES
                ? 'Coach review unlocked! Tap to claim your 60-sec review.'
                : `${COACH_GOAL_MINUTES - Math.round(weeklyMins)} more minutes to unlock a 60-sec coach review.`}
            </div>
            <div style={{ fontSize:11, fontWeight:800, color:T.muted, letterSpacing:0.8, textTransform:'uppercase', marginBottom:10 }}>What counts</div>
            {[
              { label:'Singing a song', icon:'🎤', counts:true },
              { label:'Singing a section', icon:'🎵', counts:true },
              { label:'Singing a drill', icon:'💨', counts:true },
              { label:'Voice arcade (active)', icon:'🕹️', counts:true },
              { label:'Listening', icon:'🎧', counts:false },
              { label:'Browsing songs', icon:'📱', counts:false },
            ].map(r => (
              <div key={r.label} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0',
                borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                <span style={{ fontSize:16 }}>{r.icon}</span>
                <span style={{ flex:1, fontSize:13, fontWeight:700, color: r.counts ? T.white : T.muted }}>{r.label}</span>
                <span style={{ fontSize:12, fontWeight:900, color: r.counts ? '#10B981' : 'rgba(255,255,255,0.2)' }}>{r.counts ? 'Yes' : 'No'}</span>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// ── Today Tasks Sheet ──
function TodaySheet({ tasks, onClose, onGoTab }) {
  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
      <div onPointerUp={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)',
        backdropFilter:'blur(4px)', WebkitBackdropFilter:'blur(4px)' }} />
      <div style={{ position:'relative', zIndex:1, background:'#1a1008',
        borderRadius:'24px 24px 0 0', padding:'20px 16px 40px',
        border:'1px solid rgba(255,180,80,0.15)', borderBottom:'none',
        animation:'sheetUp 0.35s cubic-bezier(0.16,1,0.3,1) both',
        maxHeight:'60%', overflowY:'auto' }}>
        <div style={{ width:36, height:4, borderRadius:2, background:'rgba(255,255,255,0.15)',
          margin:'0 auto 16px' }} />
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
          <img src="clipboard.webp" style={{ width:32, height:40, objectFit:'contain' }} />
          <div>
            <div style={{ fontSize:18, fontWeight:900, color:T.white }}>Today's Goals</div>
            <div style={{ fontSize:11, fontWeight:600, color:T.muted }}>Complete these to earn fans</div>
          </div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {tasks.map((task, i) => (
            <div key={task.id}
              onPointerUp={() => { onClose(); onGoTab(task.tab); }}
              style={{
                display:'flex', alignItems:'center', gap:14, padding:'14px 16px',
                background:'rgba(255,255,255,0.05)', borderRadius:16, cursor:'pointer',
                border:'1px solid rgba(255,255,255,0.06)',
                animation:`popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) ${i*60}ms both`,
                transition:'transform 130ms ease',
              }}
              onPointerDown={e => e.currentTarget.style.transform='scale(0.97)'}
              onPointerLeave={e => e.currentTarget.style.transform='scale(1)'}>
              <div style={{ width:42, height:42, borderRadius:12, flexShrink:0,
                background:'rgba(255,180,80,0.12)',
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>
                {task.icon}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:800, color:T.white }}>{task.label}</div>
                <div style={{ fontSize:11, fontWeight:600, color:T.muted, marginTop:2 }}>{task.sub}</div>
              </div>
              <div style={{ padding:'4px 10px', borderRadius:8, background:'rgba(255,105,0,0.15)',
                border:'1px solid rgba(255,105,0,0.2)' }}>
                <span style={{ fontSize:12, fontWeight:900, color:T.amber }}>+{task.fans} 👥</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Bar Home Screen ──
function BarHome({ fans, superfans, weeklyMins, onGoTab }) {
  const [speechChar, setSpeechChar] = React.useState(null);
  const [speechText, setSpeechText] = React.useState('');
  const [showToday, setShowToday] = React.useState(false);
  const [hudSheet, setHudSheet] = React.useState(null);

  const quip = (who) => {
    const quips = who === 'zeke' ? ZEKE_QUIPS : STU_QUIPS;
    const text = quips[Math.floor(Math.random() * quips.length)];
    setSpeechChar(who);
    setSpeechText(text);
  };

  const dismissSpeech = () => { setSpeechChar(null); setSpeechText(''); };

  // Bg ambience audio — autoplay on mount; retry on first interaction if browser blocks
  const audioRef = React.useRef(null);
  const [audioBlocked, setAudioBlocked] = React.useState(false);
  React.useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    audio.volume = 0.3;
    audio.play().then(() => {
      setAudioBlocked(false);
    }).catch(() => {
      setAudioBlocked(true);
      const unlock = () => {
        audio.play().catch(() => {});
        setAudioBlocked(false);
        window.removeEventListener('pointerdown', unlock, true);
        window.removeEventListener('keydown', unlock, true);
      };
      window.addEventListener('pointerdown', unlock, true);
      window.addEventListener('keydown', unlock, true);
    });
  }, []);

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>
      <audio ref={audioRef} src="smooth_jazz_bar_crowd.wav" loop preload="auto" style={{ display:'none' }} />
      {/* Bar scene background */}
      <div style={{ position:'absolute', inset:0 }}>
        <img src="bar-scene-empty-level1.png" alt="Stu's Bar"
          style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top' }} />
        {/* Warm single overhead light — emphasises the one working lamp */}
        <div style={{ position:'absolute', top:0, left:0, right:0, height:'60%',
          background:'radial-gradient(ellipse 55% 45% at 42% 0%, rgba(255,155,50,0.2) 0%, transparent 70%)',
          pointerEvents:'none' }} />
        {/* Subtle darkness on the right — empty dim shelves */}
        <div style={{ position:'absolute', inset:0,
          background:'linear-gradient(105deg, transparent 35%, rgba(0,0,0,0.28) 100%)',
          pointerEvents:'none' }} />
        <div style={{ position:'absolute', inset:0,
          background:'linear-gradient(to bottom, transparent 0%, transparent 58%, rgba(26,16,8,0.95) 90%, #1a1008 100%)' }} />
      </div>

      {/* Tap anywhere to dismiss speech */}
      {speechChar && (
        <div onClick={dismissSpeech}
          style={{ position:'absolute', inset:0, zIndex:4 }} />
      )}

      {/* Tap for sound chip — unobtrusive, only while autoplay is blocked */}
      {audioBlocked && (
        <div style={{ position:'absolute', top:'22%', left:'50%', transform:'translateX(-50%)',
          zIndex:15, background:'rgba(15,8,2,0.65)',
          backdropFilter:'blur(10px)', WebkitBackdropFilter:'blur(10px)',
          border:'1px solid rgba(255,180,80,0.2)', borderRadius:20, padding:'5px 13px',
          pointerEvents:'none', whiteSpace:'nowrap',
          animation:'fadeUp 0.4s ease both' }}>
          <span style={{ fontSize:10, fontWeight:700, color:'rgba(255,255,255,0.55)' }}>🔊 tap for sound</span>
        </div>
      )}

      {/* HUD */}
      <HUD fans={fans} superfans={superfans} weeklyMins={weeklyMins}
        weeklyGoal={COACH_GOAL_MINUTES} onTap={setHudSheet} />

      {/* Stu behind bar — positioned upper-left area */}
      <div style={{ position:'absolute', left:16, bottom:'28%', zIndex:5 }}>
        <div style={{ position:'relative' }}>
          {speechChar === 'stu' && (
            <SpeechBubble text={speechText} side="left" onDismiss={dismissSpeech} />
          )}
          <img src="stu-arms-crossed.webp" alt="Stu"
            onClick={(e) => { e.stopPropagation(); quip('stu'); }}
            style={{
              height:130, objectFit:'contain', cursor:'pointer',
              filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.5))',
              animation:'popIn 0.5s 0.2s both',
              transition:'transform 0.15s ease',
            }}
            onPointerDown={e => e.currentTarget.style.transform='scale(0.95)'}
            onPointerLeave={e => e.currentTarget.style.transform='scale(1)'} />
        </div>
      </div>

      {/* Zeke standing — positioned right area */}
      <div style={{ position:'absolute', right:16, bottom:'28%', zIndex:5 }}>
        <div style={{ position:'relative' }}>
          {speechChar === 'zeke' && (
            <SpeechBubble text={speechText} side="right" onDismiss={dismissSpeech} />
          )}
          <img src="zeke-standing.webp" alt="Zeke"
            onClick={(e) => { e.stopPropagation(); quip('zeke'); }}
            style={{
              height:160, objectFit:'contain', cursor:'pointer',
              filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.5))',
              animation:'popIn 0.5s 0.3s both',
              transition:'transform 0.15s ease',
            }}
            onPointerDown={e => e.currentTarget.style.transform='scale(0.95)'}
            onPointerLeave={e => e.currentTarget.style.transform='scale(1)'} />
        </div>
      </div>

      {/* Clipboard — pinned top-right below HUD, Supercell quest-board style */}
      <div style={{ position:'absolute', top:62, right:12, zIndex:11 }}>
        <div
          style={{
            cursor:'pointer', userSelect:'none',
            animation:'floatY 3s ease-in-out infinite',
            transition:'transform 0.15s ease',
          }}
          onPointerDown={e => e.currentTarget.style.transform='scale(0.88)'}
          onPointerUp={e => { e.currentTarget.style.transform='scale(1)'; setShowToday(true); }}
          onPointerLeave={e => e.currentTarget.style.transform='scale(1)'}>
          <div style={{ position:'relative' }}>
            <img src="nav-clipboard.png" alt="Today's Goals"
              style={{ width:52, height:52, objectFit:'contain',
                filter:'drop-shadow(0 3px 10px rgba(255,180,50,0.5))' }} />
            <div style={{ position:'absolute', top:-6, right:-6,
              width:22, height:22, borderRadius:11, background:T.brand,
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 2px 8px rgba(255,105,0,0.6)',
              border:'2px solid #1a1008' }}>
              <span style={{ fontSize:10, fontWeight:900, color:'white' }}>{TODAY_TASKS.length}</span>
            </div>
          </div>
        </div>
      </div>

      {/* Today tasks sheet */}
      {showToday && (
        <TodaySheet tasks={TODAY_TASKS} onClose={() => setShowToday(false)} onGoTab={onGoTab} />
      )}

      {/* HUD detail sheets */}
      {hudSheet && (
        <HudDetailSheet type={hudSheet} fans={fans} superfans={superfans}
          weeklyMins={weeklyMins} onClose={() => setHudSheet(null)} />
      )}
    </div>
  );
}

// ── V4 plumbing bridge screens ──
// v5 owns the new world/home UI. When a bottom-nav mode is selected,
// we mount a local copy of the proven v4 clickable prototype inside the
// content area and deep-link its initial route with ?start=... .
function PlumbingFrame({ start, title }) {
  return (
    <iframe
      title={title}
      src={`./v4/index.html?start=${encodeURIComponent(start)}`}
      style={{ width:'100%', height:'100%', border:0, display:'block', background:'#0A0A0A' }}
      allow="autoplay; fullscreen"
    />
  );
}

function JukeboxScreen() {
  return <PlumbingFrame title="Jukebox prototype" start="mySongs" />;
}

function ArcadeScreen() {
  return <PlumbingFrame title="Arcade prototype" start="arcade" />;
}

function DrillsScreen() {
  return <PlumbingFrame title="Drills prototype" start="drills" />;
}

function ProfileScreen() {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', background:'#1a1008', padding:32 }}>
      <div style={{ fontSize:48, marginBottom:16 }}>👤</div>
      <div style={{ fontSize:20, fontWeight:900, color:T.white, marginBottom:8 }}>Profile</div>
      <div style={{ fontSize:13, fontWeight:600, color:T.muted, textAlign:'center' }}>
        Profile plumbing is still a v5 placeholder; v4 did not include a dedicated profile flow.
      </div>
    </div>
  );
}

// ── Bottom Nav ──
const NAV_TABS = [
  { id:'home', label:'Home', img:'nav-home.png' },
  { id:'jukebox', label:'Jukebox', img:'nav-jukebox.png' },
  { id:'arcade', label:'Arcade', img:'nav-arcade.png' },
  { id:'drills', label:'Drills', img:'nav-drills.png' },
  { id:'profile', label:'Profile', img:'nav-profile.png' },
];

function BottomNav({ active, onTap }) {
  return (
    <div style={{
      height:84, flex:'0 0 84px', boxSizing:'border-box',
      display:'flex', alignItems:'stretch', justifyContent:'space-around',
      padding:'4px 4px max(8px, env(safe-area-inset-bottom))',
      background:'linear-gradient(to top, rgba(12,7,2,0.99), rgba(20,12,4,0.97))',
      borderTop:'1.5px solid rgba(255,180,80,0.18)',
      boxShadow:'0 -6px 24px rgba(0,0,0,0.40)',
      position:'relative', zIndex:30,
    }}>
      {NAV_TABS.map(tab => {
        const isActive = active === tab.id;
        return (
          <div key={tab.id} onClick={() => onTap(tab.id)}
            style={{
              flex:1, minWidth:0,
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', gap:2,
              cursor:'pointer', userSelect:'none', padding:'3px 2px 0',
              WebkitTapHighlightColor:'transparent',
              transition:'transform 120ms ease',
            }}
            onPointerDown={e => e.currentTarget.style.transform='scale(0.88)'}
            onPointerUp={e => e.currentTarget.style.transform='scale(1)'}
            onPointerLeave={e => e.currentTarget.style.transform='scale(1)'}>
            <div style={{
              width:44, height:44, borderRadius:14, overflow:'hidden',
              display:'flex', alignItems:'center', justifyContent:'center',
              background: isActive
                ? 'radial-gradient(circle at 50% 40%, rgba(255,200,80,0.28), rgba(255,105,0,0.15) 70%, rgba(255,80,0,0.06))'
                : 'rgba(255,255,255,0.03)',
              border: isActive
                ? '2px solid rgba(255,180,80,0.5)'
                : '2px solid rgba(255,255,255,0.05)',
              boxShadow: isActive
                ? '0 0 16px rgba(255,150,50,0.35), 0 2px 8px rgba(255,105,0,0.25), inset 0 1px 0 rgba(255,220,120,0.2)'
                : 'none',
              transition:'all 0.2s ease',
            }}>
              <img src={tab.img} alt={tab.label}
                style={{
                  width:34, height:34, objectFit:'contain',
                  filter: isActive
                    ? 'brightness(1.3) saturate(1.4) drop-shadow(0 0 4px rgba(255,180,50,0.5))'
                    : 'brightness(0.5) saturate(0.3)',
                  transition:'filter 0.2s ease',
                }} />
            </div>
            <span style={{
              display:'block', lineHeight:'11px', height:11,
              fontSize:8, fontWeight:900, letterSpacing:0.3,
              color: isActive ? T.gold : 'rgba(255,255,255,0.4)',
              textTransform:'uppercase',
              transition:'color 0.2s ease',
              textShadow: isActive ? '0 0 8px rgba(255,200,50,0.4)' : 'none',
              whiteSpace:'nowrap',
            }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── App Shell ──
function App() {
  const [tab, setTab] = React.useState('home');
  const [fans] = React.useState(32);
  const [superfans] = React.useState(['first_believer']);
  const [weeklyMins] = React.useState(18);

  const goTab = (t) => setTab(t);

  React.useEffect(() => {
    window.__V5_DEBUG__ = { tab, setTab, goTab };
  }, [tab]);

  return (
    <IOSDevice>
      <div style={{ display:'flex', flexDirection:'column', height:'100%', background:T.bg, minHeight:0 }}>
        <div style={{ flex:'1 1 auto', minHeight:0, position:'relative', overflow:'hidden' }}>
          {tab === 'home' && <BarHome fans={fans} superfans={superfans} weeklyMins={weeklyMins} onGoTab={goTab} />}
          {tab === 'jukebox' && <JukeboxScreen />}
          {tab === 'arcade' && <ArcadeScreen />}
          {tab === 'drills' && <DrillsScreen />}
          {tab === 'profile' && <ProfileScreen />}
        </div>
        <BottomNav active={tab} onTap={setTab} />
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
